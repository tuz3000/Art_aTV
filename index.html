<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
}

/* поиск */
input {
  width:92%;
  margin:14px 4%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:#1a1a1a;
  color:white;
  font-size:17px;
}

/* список */
.list {
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:12px;
}

/* карточка — ещё крупнее */
.item {
  display:flex;
  align-items:center;
  gap:16px;
  background:#15151c;
  padding:14px;
  border-radius:16px;
  min-height:130px;
}

/* ПОСТЕР — СИЛЬНО КРУПНЕЕ */
.poster {
  width:95px;
  height:140px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  flex-shrink:0;
}

/* НАЗВАНИЕ — КРУПНОЕ */
.title {
  flex:1;
  font-size:18px;
  font-weight:700;
  line-height:1.2;
}

/* кнопка */
.btn {
  background:#3aa0ff;
  color:white;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  text-decoration:none;
  white-space:nowrap;
  flex-shrink:0;
  box-shadow:0 6px 14px rgba(58,160,255,0.35);
}

.btn:active {
  transform:scale(0.95);
}

/* адаптация под телефон */
@media (max-width: 500px) {

  .item {
    min-height:125px;
    padding:12px;
  }

  .poster {
    width:85px;
    height:125px;
  }

  .title {
    font-size:17px;
  }

  .btn {
    font-size:13px;
    padding:10px 12px;
  }
}
</style>
