<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Serials</title>
<style>
body { font-family: Arial; background:#111; color:white; margin:0; }
input { width:90%; padding:10px; margin:15px; }
.container { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; padding:10px; }
.card { background:#222; border-radius:10px; overflow:hidden; cursor:pointer; }
.card img { width:100%; height:220px; object-fit:cover; }
.card h3 { font-size:14px; margin:5px; }
.card p { font-size:12px; margin:5px; color:#aaa; }
</style>
</head>
<body>

<input id="search" placeholder="Поиск сериалов...">

<div class="container" id="list"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];

fetch(SHEET_URL)
.then(r => r.text())
.then(t => {
    const rows = t.split("\n").slice(1);

    data = rows.map(r => {
        const c = r.split(",");
        return {
            poster: c[0],
            title: c[1],
            link: c[2],
            desc: c[3]
        };
    });

    render(data);
});

function render(list){
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(i => {
        if(!i.title) return;

        box.innerHTML += `
        <div class="card" onclick="window.open('${i.link}','_blank')">
            <img src="${i.poster}">
            <h3>${i.title}</h3>
            <p>${i.desc || ''}</p>
        </div>`;
    });
}

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(data.filter(i => (i.title || "").toLowerCase().includes(q)));
});
</script>

</body>
</html>
