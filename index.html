<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Admin Real-Time</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

.header{
  padding:14px;
  background:#111;
  font-weight:800;
}

.grid{
  display:grid;
  gap:14px;
  padding:14px;
}

.card{
  background:#15151c;
  padding:14px;
  border-radius:12px;
}

.big{
  font-size:22px;
  font-weight:800;
  color:#3aa0ff;
}
</style>
</head>

<body>

<div class="header">📊 Real-Time Admin</div>

<div class="grid">

  <div class="card">
    <div class="big" id="onlineCount">0</div>
    <div>🟢 Онлайн сейчас</div>
    <div id="onlineList"></div>
  </div>

  <div class="card">
    <div class="big" id="users">0</div>
    <div>👤 Пользователи</div>
  </div>

  <div class="card">
    <div class="big" id="clicks">0</div>
    <div>🔥 Клики</div>
  </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// ================= ONLINE REAL-TIME =================
db.collection("online").onSnapshot(snap=>{

  let list=[];
  let now=Date.now();

  snap.forEach(d=>{
    const u=d.data();

    if(now-u.lastSeen<60000){
      list.push(u);
    }
  });

  document.getElementById("onlineCount").innerText=list.length;

  const box=document.getElementById("onlineList");
  box.innerHTML="";

  list.forEach(u=>{
    box.innerHTML+=`👤 @${u.username}<br>`;
  });
});


// ================= USERS =================
db.collection("analytics").onSnapshot(snap=>{
  let set=new Set();

  snap.forEach(d=>{
    set.add(d.data().user_id);
  });

  document.getElementById("users").innerText=set.size;
});


// ================= CLICKS =================
db.collection("clicks").onSnapshot(snap=>{
  let total=0;

  snap.forEach(d=>{
    total+=d.data().count||0;
  });

  document.getElementById("clicks").innerText=total;
});

</script>

</body>
</html>
