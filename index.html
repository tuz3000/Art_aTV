<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
}

/* поиск */
input {
  width:92%;
  margin:10px 4%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
  font-size:14px;
}

/* список */
.list {
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:8px;
}

/* карточка */
.item {
  display:flex;
  align-items:center;
  gap:10px;
  background:#15151c;
  padding:8px;
  border-radius:12px;
  height:92px; /* ключ: убирает "разрыв" */
}

/* постер */
.poster {
  width:50px;
  height:75px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
  flex-shrink:0;
}

/* название */
.title {
  flex:1;
  font-size:13px;
  line-height:1.2;
  overflow:hidden;
}

/* кнопка */
.btn {
  background:#e50914;
  color:white;
  padding:8px 10px;
  border-radius:8px;
  font-size:11px;
  text-decoration:none;
  white-space:nowrap;
  flex-shrink:0;
}

/* улучшение для телефона */
@media (max-width: 500px) {
  .item {
    height:88px;
  }

  .title {
    font-size:12px;
  }

  .btn {
    padding:7px 8px;
    font-size:10px;
  }
}
</style>
