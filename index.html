<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>@Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

/* HEADER (CLEAN STYLE) */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#111;
  padding:12px 14px;
  font-weight:900;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

/* BRAND */
.brand a{
  color:#3aa0ff;
  font-weight:900;
  text-decoration:none;
}

/* SUPPORT */
.support{
  background:#2a2a2a;
  padding:8px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
}

/* SEARCH */
.search{
  margin-top:60px;
  padding:10px 12px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

/* SECTION */
.section{
  padding:12px;
  font-weight:900;
  color:#3aa0ff;
}

/* TOP DROPDOWN */
.top-wrapper{
  margin:0 12px;
}

.top-header{
  background:#1a1a22;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  font-weight:900;
}

.top-list{
  display:none;
  margin-top:6px;
}

.top-item{
  padding:10px;
  background:#15151c;
  margin-bottom:6px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

/* CARD */
.card{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px;
  margin:10px 12px;
  background:#15151c;
  border-radius:12px;
}

/* POSTER */
.card img{
  width:80px;
  height:115px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* TITLE */
.title{
  flex:1;
  font-weight:900;
  font-size:18px;
}

/* BUTTON */
.btn{
  background:#3aa0ff;
  padding:9px 12px;
  border-radius:8px;
  font-size:13px;
  color:white;
  text-decoration:none;
}

/* HIGHLIGHT */
.highlight{
  border:2px solid #3aa0ff;
  box-shadow:0 0 20px rgba(58,160,255,0.6);
}

/* UP BUTTON FIXED */
.up-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:999;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <a href="https://t.me/Art_aTV" target="_blank">@Art_aTV</a>
  </div>

  <div class="support" onclick="window.open('https://t.me/Art_aTV_support_bot','_blank')">
    ⚙️ Поддержка
  </div>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Поиск..." oninput="render()">
</div>

<!-- TOP DROPDOWN -->
<div class="section">🔥 ТОП 5 популярных</div>

<div class="top-wrapper">
  <div class="top-header" onclick="toggleTop()">
    <span>Показать / скрыть</span>
    <span>▼</span>
  </div>

  <div id="topList" class="top-list"></div>
</div>

<!-- LIST -->
<div class="section">🎬 Все сериалы</div>
<div id="list"></div>

<!-- UP -->
<div class="up-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>

const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];
let clicks = JSON.parse(localStorage.getItem("clicks") || "{}");


// LOAD
fetch(SHEET)
.then(r=>r.text())
.then(t=>{

  const rows = t.trim().split("\n").slice(1);

  data = rows.map(r=>{
    const c = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

    return {
      title: (c[0] || "").trim(),
      link: (c[1] || "").trim(),
      poster: (c[2] || "").trim(),
      kpLink: (c[3] || "").trim()
    };
  });

  render();
  updateTop();
});


// SEARCH + LIST
function render(){

  const q = document.getElementById("search").value?.toLowerCase() || "";

  const box = document.getElementById("list");
  box.innerHTML = "";

  data
  .filter(i=>i.title.toLowerCase().includes(q))
  .forEach(i=>{

    box.innerHTML += `
      <div class="card">

        <img src="${i.poster}"
          onclick="openKP('${i.kpLink}')">

        <div class="title">${i.title}</div>

        <a class="btn"
           href="${i.link}"
           onclick="addClick('${i.title}')"
           target="_blank">
           Оформить доступ
        </a>

      </div>
    `;
  });
}


// CLICK SYSTEM
function addClick(title){
  clicks[title] = (clicks[title] || 0) + 1;
  localStorage.setItem("clicks", JSON.stringify(clicks));
  updateTop();
}


// TOP UPDATE
function updateTop(){

  const box = document.getElementById("topList");
  box.innerHTML = "";

  const sorted = Object.entries(clicks)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  sorted.forEach(([title,count],i)=>{

    box.innerHTML += `
      <div class="top-item" onclick="goTo('${title}')">
        <div>${i+1}. ${title}</div>
        <div>🔥 ${count}</div>
      </div>
    `;
  });
}


// TOGGLE TOP
function toggleTop(){
  const el = document.getElementById("topList");
  el.style.display = (el.style.display === "block") ? "none" : "block";
}


// GO TO
function goTo(title){

  document.querySelectorAll(".card").forEach(c=>{
    if(c.innerText.includes(title)){
      c.scrollIntoView({behavior:"smooth",block:"center"});
      c.classList.add("highlight");
      setTimeout(()=>c.classList.remove("highlight"),2000);
    }
  });
}


// KP OPEN
function openKP(link){
  if(!link) link="https://www.kinopoisk.ru/";
  window.open(link,"_blank");
}

</script>

</body>
</html>
