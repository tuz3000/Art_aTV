<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог сериалов @Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
}

/* ШАПКА */
.header {
  padding:14px 16px;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

.brand {
  font-size:20px;
  font-weight:800;
}

.brand a {
  color:#3aa0ff;
  text-decoration:none;
}

/* ПОДДЕРЖКА (СЕРЫЙ ВЕРХ СПРАВА) */
.support {
  position:fixed;
  right:12px;
  top:14px;
  z-index:999;
}

.support a {
  display:block;
  background:#2b2b2b;
  color:#ddd;
  padding:8px 10px;
  border-radius:10px;
  text-decoration:none;
  font-size:12px;
  font-weight:600;
}

/* СЧЁТЧИК */
.counter {
  padding:10px 16px;
  font-size:14px;
  color:#aaa;
}

/* ПОИСК */
input {
  width:92%;
  margin:10px 4%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1a1a1a;
  color:white;
  font-size:16px;
}

/* БЛОКИ */
.section-title {
  padding:10px 16px 0;
  font-size:14px;
  color:#3aa0ff;
  font-weight:700;
}

/* СПИСОК */
.list {
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:10px;
}

/* КАРТОЧКА */
.item {
  display:flex;
  align-items:center;
  gap:14px;
  background:#15151c;
  padding:12px;
  border-radius:14px;
  min-height:120px;
}

/* ПОСТЕР */
.poster {
  width:80px;
  height:120px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* НАЗВАНИЕ */
.title {
  flex:1;
  font-size:16px;
  font-weight:700;
}

/* КНОПКА */
.btn {
  background:#3aa0ff;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  text-decoration:none;
  white-space:nowrap;
}

.btn:active {
  transform:scale(0.95);
}

@media (max-width: 500px) {
  .brand {
    font-size:18px;
  }

  .poster {
    width:70px;
    height:105px;
  }

  .title {
    font-size:15px;
  }

  .btn {
    font-size:12px;
    padding:8px 10px;
  }
}
</style>
</head>

<body>

<!-- ПОДДЕРЖКА -->
<div class="support">
  <a href="https://t.me/Art_aTV_support_bot" target="_blank">
    ⚙️ Поддержка
  </a>
</div>

<!-- ШАПКА -->
<div class="header">
  <div class="brand">
    Каталог сериалов <a href="https://t.me/Art_aTV" target="_blank">@Art_aTV</a>
  </div>
</div>

<div class="counter" id="counter">Загрузка...</div>

<input id="search" placeholder="Поиск сериалов...">

<div class="section-title">🔥 Популярное</div>
<div class="list" id="popular"></div>

<div class="section-title">🎬 Все сериалы</div>
<div class="list" id="list"></div>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function trackClick(title) {
  db.collection("clicks").doc(title).set({
    title: title,
    count: firebase.firestore.FieldValue.increment(1)
  }, { merge: true });
}

const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let allData = [];

fetch(SHEET)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    allData = rows.map(r => {
        const cols = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

        return {
            title: (cols[0] || "").trim(),
            link: (cols[1] || "").trim(),
            poster: (cols[2] || "").trim(),
            kp: (cols[3] || "").trim()
        };
    });

    document.getElementById("counter").innerText =
      "🎬 Всего сериалов: " + allData.length;

    loadPopular();
    renderAll(allData);
});

// загрузка популярного
function loadPopular() {
  db.collection("clicks").get().then(snapshot => {

    let stats = [];

    snapshot.forEach(doc => {
      stats.push(doc.data());
    });

    stats.sort((a,b) => (b.count || 0) - (a.count || 0));

    let popularTitles = stats.slice(0, 5).map(x => x.title);

    let popular = allData.filter(i =>
      popularTitles.includes(i.title)
    );

    renderPopular(popular);
  });
}

function renderPopular(list){
  const box = document.getElementById("popular");
  box.innerHTML = "";
  list.forEach(i => addCard(i, box));
}

function renderAll(list){
  const box = document.getElementById("list");
  box.innerHTML = "";
  list.forEach(i => addCard(i, box));
}

function addCard(i, box){
  if(!i.title) return;

  box.innerHTML += `
  <div class="item">

    <img class="poster"
         src="${i.poster}"
         onclick="window.open('${i.kp}','_blank')">

    <div class="title">${i.title}</div>

    <a class="btn"
       href="${i.link}"
       target="_blank"
       onclick="trackClick('${i.title}')"
       rel="noopener noreferrer">
       Оформить доступ
    </a>

  </div>`;
}

// поиск
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  renderAll(allData.filter(i =>
    (i.title || "").toLowerCase().includes(q)
  ));
});

</script>

</body>
</html>
