<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог @Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

/* HEADER */
.header{
  padding:16px;
  font-size:18px;
  font-weight:800;
  background:#111;
}

.header a{
  color:#3aa0ff;
  text-decoration:none;
}

/* SUPPORT BUTTON */
.support-btn{
  position:fixed;
  top:12px;
  right:12px;
  background:#2a2a2a;
  color:#fff;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  z-index:999;
  text-decoration:none;
  display:inline-block;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  margin:6px 12px;
  padding:10px;
  background:#1a1a22;
  border-radius:10px;
  cursor:pointer;
}

/* CARD */
.card{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px;
  margin:10px 12px;
  background:#15151c;
  border-radius:12px;
}

/* POSTER */
.card img{
  width:80px;
  height:115px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* TITLE */
.title{
  flex:1;
  font-weight:900;
  font-size:18px;
}

/* BUTTON */
.btn{
  background:#3aa0ff;
  padding:9px 12px;
  border-radius:8px;
  font-size:13px;
  color:white;
  text-decoration:none;
  white-space:nowrap;
}

/* UP */
.up-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.15);
  color:white;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:999;
}
</style>
</head>

<body>

<!-- ⚙️ SUPPORT -->
<a class="support-btn"
   href="https://t.me/Art_aTV_support_bot"
   target="_blank">
⚙️ Поддержка
</a>

<div class="header">
Каталог <a href="https://t.me/Art_aTV" target="_blank">@Art_aTV</a>
</div>

<div class="section">🔥 ТОП 5 популярных</div>
<div id="top"></div>

<div class="section">🎬 Все сериалы</div>
<div id="list"></div>

<div class="up-btn" onclick="scrollTopPage()">↑</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];


// CLICK TRACK
function trackClick(title){
  const ref = db.collection("clicks").doc(title);

  ref.set({
    title:title,
    count:firebase.firestore.FieldValue.increment(1)
  },{merge:true});
}


// ================= REALTIME SERIES (FIXED) =================
db.collection("series").onSnapshot(snap=>{

  data = [];

  snap.forEach(doc=>{

    const d = doc.data();

    data.push({
      title: d.title || "Без названия",
      link: d.link || "#",
      poster: d.poster || "",
      kpLink: d["Ссылка на КП"] || d.kpLink || ""
    });

  });

  render();
});


// ================= RENDER =================
function render(){

  const box = document.getElementById("list");
  box.innerHTML = "";

  if(!data.length){
    box.innerHTML = "<p style='padding:12px;color:#888'>Список пуст...</p>";
    return;
  }

  data.forEach(i=>{

    box.innerHTML += `
      <div class="card">

        <img src="${i.poster}"
          onclick="openKP('${i.kpLink}')">

        <div class="title">${i.title}</div>

        <a class="btn"
           href="${i.link}"
           target="_blank"
           onclick="trackClick('${i.title}')">
           Оформить доступ
        </a>

      </div>
    `;
  });
}


// OPEN KP
function openKP(link){

  if(!link || link.length < 5){
    link = "https://www.kinopoisk.ru/";
  }

  window.open(link, "_blank");
}


// ================= TOP =================
db.collection("clicks").onSnapshot(snap=>{

  let arr=[];

  snap.forEach(d=>arr.push(d.data()));

  arr.sort((a,b)=>(b.count||0)-(a.count||0));

  arr = arr.slice(0,5);

  const box=document.getElementById("top");
  box.innerHTML="";

  arr.forEach((i,index)=>{

    box.innerHTML+=`
      <div class="top">
        <div>${index+1}. ${i.title}</div>
        <div>🔥 ${i.count||0}</div>
      </div>
    `;
  });

});


// SCROLL
function scrollTopPage(){
  window.scrollTo({top:0,behavior:"smooth"});
}

</script>

</body>
</html>
