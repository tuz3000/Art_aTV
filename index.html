<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог @Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

/* HEADER */
.header{
  padding:16px;
  font-size:18px;
  font-weight:800;
  background:#111;
}

.header a{
  color:#3aa0ff;
  text-decoration:none;
}

/* SUPPORT */
.support-btn{
  position:fixed;
  top:12px;
  right:12px;
  background:#2a2a2a;
  color:#fff;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  z-index:999;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  margin:6px 12px;
  padding:10px;
  background:#1a1a22;
  border-radius:10px;
  cursor:pointer;
}

/* CARD */
.card{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px;
  margin:10px 12px;
  background:#15151c;
  border-radius:12px;
}

/* POSTER */
.card img{
  width:80px;
  height:115px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* TITLE */
.title{
  flex:1;
  font-weight:900;
  font-size:18px;
}

/* BUTTON */
.btn{
  background:#3aa0ff;
  padding:9px 12px;
  border-radius:8px;
  font-size:13px;
  color:white;
  text-decoration:none;
  white-space:nowrap;
}

/* UP */
.up-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.15);
  color:white;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:999;
}

/* HIGHLIGHT */
.highlight{
  border:2px solid #3aa0ff;
  box-shadow:0 0 20px rgba(58,160,255,0.6);
  transform:scale(1.02);
}
</style>
</head>

<body>

<div class="support-btn" onclick="window.open('https://t.me/Art_aTV_support_bot','_blank')">
⚙️ Поддержка
</div>

<div class="header">
Каталог <a href="https://t.me/Art_aTV" target="_blank">@Art_aTV</a>
</div>

<div class="section">🔥 ТОП 5 популярных</div>
<div id="top"></div>

<div class="section">🎬 Все сериалы</div>
<div id="list"></div>

<div class="up-btn" onclick="scrollTopPage()">↑</div>

<script>

const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];


// ================= LOAD SHEET =================
fetch(SHEET)
.then(r=>r.text())
.then(t=>{

  const rows = t.trim().split("\n").slice(1);

  data = rows.map(r=>{
    const c = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

    return {
      title: (c[0] || "").trim(),
      link: (c[1] || "").trim(),
      poster: (c[2] || "").trim(),
      kpLink: (c[3] || "").trim()
    };
  });

  render();
});


// ================= RENDER =================
function render(){

  const box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach(i=>{

    box.innerHTML += `
      <div class="card">

        <img src="${i.poster}"
          onclick="openKP('${i.kpLink}')">

        <div class="title">${i.title}</div>

        <a class="btn"
          href="${i.link}"
          target="_blank">
          Оформить доступ
        </a>

      </div>
    `;
  });
}


// ================= OPEN KP =================
function openKP(link){

  if(!link || link.length < 5){
    link = "https://www.kinopoisk.ru/";
  }

  window.open(link, "_blank");
}


// ================= TOP (DEMO SIMPLE) =================
function loadTop(){

  const box = document.getElementById("top");

  const top5 = data.slice(0,5);

  box.innerHTML = "";

  top5.forEach((i,index)=>{

    box.innerHTML += `
      <div class="top" onclick="goTo('${i.title}')">
        <div>${index+1}. ${i.title}</div>
      </div>
    `;
  });
}

setTimeout(loadTop, 1000);


// ================= GO TO =================
function goTo(title){

  document.querySelectorAll(".card").forEach(c=>{
    if(c.innerText.includes(title)){
      c.scrollIntoView({behavior:"smooth",block:"center"});
      c.classList.add("highlight");

      setTimeout(()=>c.classList.remove("highlight"),2500);
    }
  });
}


// ================= SCROLL =================
function scrollTopPage(){
  window.scrollTo({top:0,behavior:"smooth"});
}

</script>

</body>
</html>
