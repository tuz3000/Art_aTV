<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Art_aTV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --bg:#050505;
  --card:#111114;
  --muted:#9b9b9b;
  --gold:#f6c453;
  --white:#fff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,rgba(255,255,255,.07),transparent 28%),#050505;
  color:white;
}

.header{
  position:sticky;
  top:0;
  z-index:20;
  padding:18px 16px 14px;
  background:rgba(5,5,5,.9);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.06);
}

.logo-row{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-a{
  font-size:38px;
  font-weight:900;
  letter-spacing:-2px;
}

.play{
  width:0;
  height:0;
  border-top:9px solid transparent;
  border-bottom:9px solid transparent;
  border-left:15px solid var(--gold);
}

.brand a{
  color:white;
  text-decoration:none;
  font-size:26px;
  font-weight:900;
}

.subtitle{
  margin-top:4px;
  color:var(--muted);
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.support{
  position:fixed;
  right:12px;
  top:14px;
  z-index:999;
}

.support a{
  display:block;
  background:rgba(255,255,255,.08);
  color:#ddd;
  padding:9px 12px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  text-decoration:none;
  font-size:12px;
  font-weight:800;
  backdrop-filter:blur(12px);
}

.counter{
  padding:12px 16px 4px;
  color:var(--muted);
  font-size:13px;
}

input{
  width:92%;
  margin:10px 4%;
  padding:15px 16px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.06);
  color:white;
  font-size:16px;
  outline:none;
}

.section{
  padding:18px 16px 10px;
  font-weight:900;
  cursor:pointer;
}

.section span{
  color:var(--gold);
}

.list{
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:10px 12px;
}

.item{
  display:flex;
  align-items:center;
  gap:14px;
  background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.025));
  border:1px solid rgba(255,255,255,.07);
  padding:12px;
  border-radius:18px;
  scroll-margin-top:120px;
  transition:.25s ease;
  box-shadow:0 12px 30px rgba(0,0,0,.28);
}

.item.highlight{
  outline:2px solid var(--gold);
  box-shadow:0 0 28px rgba(246,196,83,.45);
  transform:scale(1.02);
}

.poster{
  width:86px;
  height:128px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,.45);
}

.title{
  flex:1;
  font-size:18px;
  line-height:1.2;
  font-weight:900;
}

.btn{
  background:white;
  color:#050505;
  padding:10px 13px;
  border-radius:12px;
  font-size:13px;
  font-weight:900;
  text-decoration:none;
  white-space:nowrap;
}

#popular .item{
  background:rgba(246,196,83,.08);
  border:1px solid rgba(246,196,83,.18);
}

#newList .item{
  background:rgba(255,255,255,.045);
}

#scrollTopBtn{
  position:fixed;
  right:18px;
  bottom:18px;
  width:54px;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(14px);
  color:white;
  font-size:24px;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 4px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.15);
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  z-index:2000;
  background:rgba(0,0,0,.86);
  backdrop-filter:blur(10px);
  align-items:center;
  justify-content:center;
  padding:18px;
}

.modal-box{
  width:100%;
  max-width:420px;
  background:#111114;
  border:1px solid rgba(255,255,255,.1);
  border-radius:22px;
  padding:16px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.modal-box img{
  width:100%;
  max-height:540px;
  object-fit:cover;
  border-radius:16px;
}

.modal-title{
  margin:14px 0 12px;
  font-size:22px;
  font-weight:900;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.modal-actions a,
.modal-actions button{
  flex:1;
  padding:12px;
  border-radius:14px;
  border:none;
  font-weight:900;
  text-decoration:none;
  cursor:pointer;
}

.kp-btn{
  background:var(--gold);
  color:#111;
}

.close-btn{
  background:rgba(255,255,255,.1);
  color:white;
}

@media(max-width:480px){
  .brand a{font-size:23px}
  .logo-a{font-size:34px}
  .title{font-size:17px}
  .btn{font-size:12px;padding:9px 10px}
  .poster{width:82px;height:122px}
}
</style>
</head>

<body>

<div class="support">
  <a href="https://t.me/Art_aTV_support_bot">⚙️ Поддержка</a>
</div>

<div class="header">
  <div class="brand">
    <div class="logo-row">
      <div class="logo-a">A</div>
      <div class="play"></div>
      <a href="https://t.me/Art_aTV">@Art_aTV</a>
    </div>
    <div class="subtitle">Каталог сериалов</div>
  </div>
</div>

<div class="counter" id="counter">Загрузка...</div>

<input id="search" placeholder="Поиск сериалов...">

<div class="section" onclick="togglePopular()">
<span>TOP 5</span> популярных ▾
</div>

<div id="popularWrap" style="display:none;">
  <div class="list" id="popular"></div>
</div>

<div class="section">
<span>NEW</span> Новинки
</div>
<div class="list" id="newList"></div>

<div class="section">🎬 Все сериалы</div>
<div class="list" id="list"></div>

<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

<div class="modal" id="posterModal" onclick="modalBgClose(event)">
  <div class="modal-box">
    <img id="modalPoster" src="">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-actions">
      <a class="kp-btn" id="modalKp" target="_blank">Кинопоиск</a>
      <button class="close-btn" onclick="closePoster()">Закрыть</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let tg = window.Telegram?.WebApp;
if(tg){ tg.expand(); }

function getUser(){
  const u = tg?.initDataUnsafe?.user;

  if(u){
    return {
      id:String(u.id),
      username:u.username || "",
      first_name:u.first_name || "",
      last_name:u.last_name || "",
      source:"telegram"
    };
  }

  let guest = localStorage.getItem("art_atv_guest_id");
  if(!guest){
    guest = "guest_" + Math.random().toString(36).slice(2) + Date.now();
    localStorage.setItem("art_atv_guest_id", guest);
  }

  return {
    id:guest,
    username:"",
    first_name:"Guest",
    last_name:"",
    source:"browser"
  };
}

const currentUser = getUser();

function saveUserVisit(){
  const now = Date.now();
  const ref = db.collection("users").doc(currentUser.id);

  ref.set({
    id:currentUser.id,
    username:currentUser.username,
    first_name:currentUser.first_name,
    last_name:currentUser.last_name,
    source:currentUser.source,
    first_visit:firebase.firestore.FieldValue.serverTimestamp(),
    last_visit:now,
    opens:firebase.firestore.FieldValue.increment(1),
    user_agent:navigator.userAgent,
    language:navigator.language || "",
    platform:navigator.platform || ""
  },{merge:true});

  db.collection("visits").add({
    user_id:currentUser.id,
    username:currentUser.username,
    source:currentUser.source,
    time:now,
    page:"catalog"
  });

  db.collection("online").doc(currentUser.id).set({
    user_id:currentUser.id,
    username:currentUser.username,
    source:currentUser.source,
    last_seen:now
  },{merge:true});
}

saveUserVisit();
setInterval(()=>{
  db.collection("online").doc(currentUser.id).set({
    user_id:currentUser.id,
    username:currentUser.username,
    source:currentUser.source,
    last_seen:Date.now()
  },{merge:true});
},30000);

function makeId(title){
  return "item-" + title.trim().toLowerCase().replace(/\s+/g,"-");
}

function saveEvent(type,title=""){
  db.collection("events").add({
    type,
    title,
    user_id:currentUser.id,
    username:currentUser.username,
    source:currentUser.source,
    time:Date.now()
  });
}

function trackClick(title){
  const key = title.trim().toLowerCase();

  db.collection("clicks").doc(key).set({
    title:title,
    count:firebase.firestore.FieldValue.increment(1),
    time:Date.now()
  },{merge:true});

  saveEvent("access_click",title);
}

function trackPoster(title){
  saveEvent("poster_open",title);
}

function trackKP(title){
  saveEvent("kinopoisk_click",title);
}

const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let allData=[];

fetch(SHEET)
.then(r=>r.text())
.then(t=>{
  const rows=t.trim().split("\n").slice(1);

  allData=rows.map(r=>{
    const c=r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
    return{
      title:(c[0]||"").trim(),
      link:(c[1]||"").trim(),
      poster:(c[2]||"").trim(),
      kp:(c[3]||"").trim()
    };
  });

  document.getElementById("counter").innerText =
  "🎬 Всего сериалов: " + allData.length;

  render(allData);
  renderNew(allData);
  loadPopular();
});

function render(list){
  const box=document.getElementById("list");
  box.innerHTML="";

  list.forEach((i,index)=>{
    const id = makeId(i.title);

    box.innerHTML+=`
    <div class="item" id="${id}">
      <img class="poster"
        src="${i.poster}"
        onclick="openPoster(${index})">

      <div class="title">${i.title}</div>

      <a class="btn"
        href="${i.link}"
        target="_blank"
        onclick="trackClick(${JSON.stringify(i.title)})">
        Оформить доступ
      </a>
    </div>`;
  });
}

function renderNew(list){
  const box=document.getElementById("newList");
  box.innerHTML="";

  list.slice(-5).reverse().forEach((i)=>{
    const index = allData.findIndex(x=>x.title===i.title);

    box.innerHTML+=`
    <div class="item">
      <img class="poster" src="${i.poster}" onclick="openPoster(${index})">
      <div class="title">${i.title}</div>
      <a class="btn"
        href="${i.link}"
        target="_blank"
        onclick="trackClick(${JSON.stringify(i.title)})">
        Оформить доступ
      </a>
    </div>`;
  });
}

function openPoster(index){
  const i = allData[index];
  if(!i) return;

  trackPoster(i.title);

  document.getElementById("modalPoster").src = i.poster;
  document.getElementById("modalTitle").innerText = i.title;

  const kp = i.kp || "https://www.kinopoisk.ru/";
  const kpBtn = document.getElementById("modalKp");

  kpBtn.href = kp;
  kpBtn.onclick = ()=>trackKP(i.title);

  document.getElementById("posterModal").style.display="flex";
}

function closePoster(){
  document.getElementById("posterModal").style.display="none";
}

function modalBgClose(e){
  if(e.target.id === "posterModal"){
    closePoster();
  }
}

function loadPopular(){
  db.collection("clicks").onSnapshot(snap=>{
    let arr=[];

    snap.forEach(doc=>{
      arr.push(doc.data());
    });

    arr.sort((a,b)=>(b.count||0)-(a.count||0));
    arr = arr.slice(0,5);

    renderPopular(arr);
  });
}

function renderPopular(list){
  const box=document.getElementById("popular");
  box.innerHTML="";

  list.forEach((i,index)=>{
    const id = makeId(i.title);
    const num = String(index + 1).padStart(2,"0");

    box.innerHTML+=`
    <div class="item" style="cursor:pointer" onclick="scrollToItem('${id}')">
      <div class="title">${num}. ${i.title}</div>
      <div style="color:var(--gold);font-weight:900">🔥 ${i.count||0}</div>
    </div>`;
  });
}

function scrollToItem(id){
  const el = document.getElementById(id);
  if(!el) return;

  el.scrollIntoView({behavior:"smooth",block:"center"});
  el.classList.add("highlight");

  setTimeout(()=>{
    el.classList.remove("highlight");
  },1800);
}

let openPopular=false;

function togglePopular(){
  openPopular=!openPopular;
  document.getElementById("popularWrap").style.display =
  openPopular ? "block" : "none";
}

document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  render(allData.filter(i=>i.title.toLowerCase().includes(q)));
});

function scrollToTop(){
  window.scrollTo({top:0, behavior:"smooth"});
}
</script>

</body>
</html>
