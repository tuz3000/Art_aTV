<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Serials</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

input {
  width:90%;
  padding:10px;
  margin:15px;
  border-radius:8px;
  border:none;
}

.list {
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px;
}

.item {
  display:flex;
  align-items:center;
  gap:15px;
  background:#222;
  padding:10px;
  border-radius:10px;
}

.item img {
  width:60px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}

.title {
  flex:1;
  font-size:14px;
}

.btn {
  background:#4da3ff;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  text-decoration:none;
  font-size:12px;
  white-space:nowrap;
}
</style>
</head>

<body>

<input id="search" placeholder="Поиск сериалов...">

<div class="list" id="list"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];

fetch(SHEET_URL)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    data = rows.map(r => {
        const cols = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

        return {
            poster: cols[0],
            title: cols[1],
            link: cols[2]
        };
    });

    render(data);
});

function render(list){
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(i => {
        if(!i.title) return;

        box.innerHTML += `
        <div class="item">
            <img src="${i.poster}">
            <div class="title">${i.title}</div>
            <a class="btn" href="${i.link}" target="_blank">Купить</a>
        </div>`;
    });
}

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(data.filter(i => (i.title || "").toLowerCase().includes(q)));
});

</script>

</body>
</html>
