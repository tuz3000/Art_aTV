<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Catalog</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
}

/* поиск */
input {
  width:92%;
  margin:12px 4%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1a1a1a;
  color:white;
  font-size:16px;
}

/* список */
.list {
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:10px;
}

/* карточка — крупнее */
.item {
  display:flex;
  align-items:center;
  gap:14px;
  background:#15151c;
  padding:12px;
  border-radius:14px;
  min-height:110px;
}

/* постер — КРУПНЕЕ */
.poster {
  width:75px;
  height:110px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  flex-shrink:0;
}

/* название — КРУПНЕЕ */
.title {
  flex:1;
  font-size:16px;
  font-weight:600;
  line-height:1.2;
}

/* кнопка — ГОЛУБАЯ */
.btn {
  background:#3aa0ff;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  text-decoration:none;
  white-space:nowrap;
  flex-shrink:0;
  box-shadow:0 4px 10px rgba(58,160,255,0.3);
  transition:0.2s;
}

.btn:active {
  transform:scale(0.95);
}

/* адаптация */
@media (max-width: 500px) {
  .item {
    min-height:105px;
  }

  .poster {
    width:68px;
    height:100px;
  }

  .title {
    font-size:15px;
  }

  .btn {
    font-size:12px;
    padding:9px 10px;
  }
}
</style>
</head>

<body>

<input id="search" placeholder="Поиск сериалов...">

<div class="list" id="list"></div>

<script>

const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];

fetch(SHEET)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    data = rows.map(r => {
        const cols = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

        return {
            title: (cols[0] || "").trim(),
            link: (cols[1] || "").trim(),
            poster: (cols[2] || "").trim(),
            kp: (cols[3] || "").trim()
        };
    });

    render(data);
});

function render(list){
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(i => {
        if(!i.title) return;

        box.innerHTML += `
        <div class="item">

            <img class="poster"
                 src="${i.poster}"
                 onclick="window.open('${i.kp}','_blank')">

            <div class="title">${i.title}</div>

            <a class="btn"
               href="${i.link}"
               target="_blank"
               rel="noopener noreferrer">
               Оформить доступ
            </a>

        </div>`;
    });
}

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(data.filter(i =>
        (i.title || "").toLowerCase().includes(q)
    ));
});

</script>

</body>
</html>
