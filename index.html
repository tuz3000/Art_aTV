<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Art_aTV Secure Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

.header{
  padding:16px;
  background:#111;
  font-size:18px;
  font-weight:800;
}

.grid{
  padding:14px;
}

.card{
  background:#15151c;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}

.big{
  font-size:22px;
  font-weight:800;
  color:#3aa0ff;
}

.small{
  color:#aaa;
  font-size:13px;
}
</style>
</head>

<body>

<div id="denied" style="display:none;padding:20px">
  ❌ Доступ запрещён
</div>

<div id="app" style="display:none">

  <div class="header">
    🔐 Admin Panel Art_aTV
  </div>

  <div class="grid">

    <div class="card">
      <div class="big" id="online">0</div>
      <div class="small">🟢 Онлайн сейчас</div>
    </div>

    <div class="card">
      <div class="big" id="users">0</div>
      <div class="small">👤 Уникальные пользователи</div>
    </div>

    <div class="card">
      <div class="big" id="clicks">0</div>
      <div class="small">🔥 Всего кликов</div>
    </div>

  </div>

</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// ================= TELEGRAM =================
let tg = window.Telegram?.WebApp;
tg?.expand();

const userId = tg?.initDataUnsafe?.user?.id;


// ================= 🔐 ACCESS =================
const ADMIN_ID = 161181425;

if(userId !== ADMIN_ID){
  document.getElementById("denied").style.display = "block";
}else{
  document.getElementById("app").style.display = "block";
  init();
}


// ================= REAL-TIME =================
function init(){

  // ONLINE
  db.collection("online").onSnapshot(snap=>{
    document.getElementById("online").innerText = snap.size;
  });

  // USERS
  db.collection("analytics").onSnapshot(snap=>{
    let set = new Set();

    snap.forEach(d=>{
      set.add(d.data().user_id);
    });

    document.getElementById("users").innerText = set.size;
  });

  // CLICKS
  db.collection("clicks").onSnapshot(snap=>{
    let total = 0;

    snap.forEach(d=>{
      total += d.data().count || 0;
    });

    document.getElementById("clicks").innerText = total;
  });

}

</script>

</body>
</html>
