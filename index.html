<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог сериалов @Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

.header{
  padding:14px 16px;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

.brand{
  font-size:20px;
  font-weight:800;
}

.brand a{
  color:#3aa0ff;
  text-decoration:none;
}

/* поддержка */
.support{
  position:fixed;
  right:12px;
  top:12px;
  z-index:999;
}

.support a{
  display:block;
  background:#2b2b2b;
  color:#ddd;
  padding:8px 10px;
  border-radius:10px;
  text-decoration:none;
  font-size:12px;
  font-weight:600;
}

/* счётчик */
.counter{
  padding:10px 16px;
  color:#aaa;
}

/* поиск */
input{
  width:92%;
  margin:10px 4%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1a1a1a;
  color:white;
}

/* секции */
.section{
  padding:12px;
  color:#3aa0ff;
  font-weight:700;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

/* список */
.list{
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:12px;
}

/* карточка */
.item{
  display:flex;
  align-items:center;
  gap:14px;
  background:#15151c;
  padding:14px;
  border-radius:14px;
  transition:0.2s;
}

.item:hover{
  transform:scale(1.01);
}

.poster{
  width:80px;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

.title{
  flex:1;
  font-size:16px;
  font-weight:700;
}

/* кнопка */
.btn{
  background:#3aa0ff;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  text-decoration:none;
}

/* динамическая иконка */
.badge{
  font-size:18px;
}
</style>
</head>

<body>

<div class="support">
  <a href="https://t.me/Art_aTV_support_bot">⚙️ Техподдержка</a>
</div>

<div class="header">
  <div class="brand">
    Каталог сериалов <a href="https://t.me/Art_aTV">@Art_aTV</a>
  </div>
</div>

<div class="counter" id="counter">Загрузка...</div>

<input id="search" placeholder="Поиск сериалов...">

<!-- 🔥 ПОПУЛЯРНОЕ -->
<div class="section" onclick="togglePopular()">
  <span>🔥 Популярное</span>
  <span id="arrow">⯈</span>
</div>

<div id="popularWrap" style="display:none;">
  <div class="list" id="popular"></div>
</div>

<!-- 🎬 ВСЕ СЕРИАЛЫ -->
<div class="section">
  🎬 Все сериалы
</div>

<div class="list" id="list"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 LIVE ОБНОВЛЕНИЕ
function startLive(){
  db.collection("clicks").onSnapshot(() => {
    loadPopular();
  });
}

// нормализация
function key(title){
  return title.trim().toLowerCase();
}

// клики
function trackClick(title){
  db.collection("clicks").doc(key(title)).set({
    title:title,
    count:firebase.firestore.FieldValue.increment(1),
    time:Date.now()
  },{merge:true});
}

// SHEET
const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let allData=[];

fetch(SHEET)
.then(r=>r.text())
.then(t=>{

  const rows=t.trim().split("\n").slice(1);

  allData=rows.map(r=>{
    const c=r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

    return{
      title:(c[0]||"").trim(),
      link:(c[1]||"").trim(),
      poster:(c[2]||"").trim(),
      kp:(c[3]||"").trim()
    };
  });

  document.getElementById("counter").innerText =
  "🎬 Всего сериалов: " + allData.length;

  render(allData);
  loadPopular();
  startLive();
});

// 🎬 ВСЕ СЕРИАЛЫ
function render(list){
  const box=document.getElementById("list");
  box.innerHTML="";

  list.forEach(i=>{

    const emoji = ["🎬","📺","🔥","⭐","🎥"][Math.floor(Math.random()*5)];

    box.innerHTML+=`
    <div class="item">

      <img class="poster"
        src="${i.poster}"
        onclick="window.open('${i.kp}','_blank')">

      <div class="title">${emoji} ${i.title}</div>

      <a class="btn"
        href="${i.link}"
        target="_blank"
        onclick="trackClick('${i.title}')">
        Оформить доступ
      </a>

    </div>`;
  });
}

// 🔥 ПОПУЛЯРНОЕ
function loadPopular(){

  db.collection("clicks")
  .get()
  .then(snap=>{

    let arr=[];

    snap.forEach(doc=>{
      arr.push(doc.data());
    });

    arr.sort((a,b)=>(b.count||0)-(a.count||0));
    arr=arr.slice(0,5);

    renderPopular(arr);
  });
}

// 🔥 ОТРИСОВКА
function renderPopular(list){
  const box=document.getElementById("popular");
  box.innerHTML="";

  const emojis=["🔥","⭐","🚀","💎","⚡"];

  list.forEach((i,index)=>{

    box.innerHTML+=`
    <div class="item"
      style="cursor:pointer"
      onclick="scrollToItem('${key(i.title)}')">

      <div class="title">${emojis[index]} ${i.title}</div>

      <div style="color:#3aa0ff;font-weight:700">
        🔥 ${i.count||0}
      </div>

    </div>`;
  });
}

// 🔽 стрелка + раскрытие
let open=false;

function togglePopular(){
  open=!open;

  document.getElementById("popularWrap").style.display =
  open ? "block" : "none";

  document.getElementById("arrow").innerText =
  open ? "⯆" : "⯈";
}

// 🔽 скролл
function scrollToItem(id){
  const el=[...document.querySelectorAll(".item")]
    .find(e=>key(e.innerText).includes(id));

  if(!el) return;

  el.scrollIntoView({behavior:"smooth",block:"center"});

  el.style.outline="2px solid #3aa0ff";
  setTimeout(()=>el.style.outline="",1500);
}

// 🔍 поиск
document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();

  render(allData.filter(i=>
    i.title.toLowerCase().includes(q)
  ));
});

</script>

</body>
</html>
