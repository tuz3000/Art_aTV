<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Catalog</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
}

input {
  width:92%;
  margin:12px 4%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.list {
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px;
}

.item {
  display:flex;
  align-items:center;
  gap:12px;
  background:#15151c;
  padding:10px;
  border-radius:12px;
}

.poster {
  width:55px;
  height:85px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}

.title {
  flex:1;
  font-size:14px;
}

.btn {
  background:#e50914;
  color:white;
  padding:7px 10px;
  border-radius:8px;
  font-size:12px;
  text-decoration:none;
}
</style>
</head>

<body>

<input id="search" placeholder="Поиск...">

<div class="list" id="list"></div>

<script>

const API =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/gviz/tq?tqx=out:json";

let data = [];

fetch(API)
.then(r => r.text())
.then(t => {

    const json = JSON.parse(t.substring(47).slice(0, -2));
    const rows = json.table.rows;

    data = rows.map(r => ({
        title: r.c[0]?.v || "",
        link: r.c[1]?.v || "",
        poster: r.c[2]?.v || "",
        kp: r.c[3]?.v || ""
    }));

    render(data);
});

function render(list){
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(i => {
        if(!i.title) return;

        box.innerHTML += `
        <div class="item">

            <img class="poster"
                 src="${i.poster}"
                 onclick="window.open('${i.kp}','_blank')">

            <div class="title">${i.title}</div>

            <a class="btn"
               href="${i.link}"
               target="_blank"
               rel="noopener noreferrer">
               СМОТРЕТЬ
            </a>

        </div>`;
    });
}

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(data.filter(i =>
        (i.title || "").toLowerCase().includes(q)
    ));
});

</script>

</body>
</html>
