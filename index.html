<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Catalog</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0f;
  color: white;
}

/* верх */
.header {
  padding: 18px;
  font-size: 20px;
  font-weight: bold;
  background: #111;
  color: #e50914;
}

/* поиск */
input {
  width: 92%;
  margin: 12px 4%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1a1a1a;
  color: white;
}

/* список */
.list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px;
}

/* карточка */
.item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #15151c;
  padding: 10px;
  border-radius: 12px;
  transition: 0.2s;
}

.item:hover {
  background: #1f1f2a;
}

/* постер */
.poster {
  width: 55px;
  height: 85px;
  border-radius: 6px;
  object-fit: cover;
  cursor: pointer;
}

/* название */
.title {
  flex: 1;
  font-size: 14px;
}

/* кнопка */
.btn {
  background: #e50914;
  color: white;
  padding: 7px 10px;
  border-radius: 8px;
  font-size: 12px;
  text-decoration: none;
  white-space: nowrap;
}
</style>
</head>

<body>

<div class="header">CATALOG</div>

<input id="search" placeholder="Поиск сериалов...">

<div class="list" id="list"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];

fetch(SHEET_URL)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    data = rows.map(r => {
        const cols = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

        return {
            poster: cols[0],
            title: cols[1],
            link: cols[2],
            kp: cols[3]
        };
    });

    render(data);
});

function render(list){
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(i => {
        if(!i.title) return;

        box.innerHTML += `
        <div class="item">

            <!-- постер → Kinopoisk -->
            <img class="poster"
                 src="${i.poster}"
                 onclick="window.open('${i.kp}','_blank')">

            <!-- название -->
            <div class="title">${i.title}</div>

            <!-- кнопка → бот -->
            <a class="btn"
               href="${i.link}"
               target="_blank"
               rel="noopener noreferrer">
               СМОТРЕТЬ
            </a>

        </div>`;
    });
}

/* поиск */
document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(data.filter(i =>
        (i.title || "").toLowerCase().includes(q)
    ));
});

</script>

</body>
</html>
