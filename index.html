<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Art_aTV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{--gold:#f6c453;--muted:#9b9b9b}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,rgba(255,255,255,.07),transparent 28%),#050505;color:white}
.header{position:sticky;top:0;z-index:20;padding:18px 16px 14px;background:rgba(5,5,5,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-a{font-size:38px;font-weight:900;letter-spacing:-2px}
.play{width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-left:15px solid var(--gold)}
.brand a{color:white;text-decoration:none;font-size:26px;font-weight:900}
.subtitle{margin-top:4px;color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase}
.support{position:fixed;right:12px;top:14px;z-index:999}
.support a{display:block;background:rgba(255,255,255,.08);color:#ddd;padding:9px 12px;border:1px solid rgba(255,255,255,.12);border-radius:12px;text-decoration:none;font-size:12px;font-weight:800;backdrop-filter:blur(12px)}
.counter{padding:12px 16px 4px;color:var(--muted);font-size:13px}
input{width:92%;margin:10px 4%;padding:15px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.06);color:white;font-size:16px;outline:none}
.section{padding:18px 16px 10px;font-weight:900;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.section span{color:var(--gold)}
.list{display:flex;flex-direction:column;gap:14px;padding:10px 12px}
.item{display:flex;align-items:center;gap:14px;background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.07);padding:12px;border-radius:18px;scroll-margin-top:120px;transition:.25s ease;box-shadow:0 12px 30px rgba(0,0,0,.28)}
.item.highlight{outline:2px solid var(--gold);box-shadow:0 0 28px rgba(246,196,83,.45);transform:scale(1.02)}
.poster{width:86px;height:128px;object-fit:cover;border-radius:12px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.45)}
.title{flex:1;font-size:18px;line-height:1.2;font-weight:900}
.btn{background:white;color:#050505;padding:10px 13px;border-radius:12px;font-size:13px;font-weight:900;text-decoration:none;white-space:nowrap}
#popular .item{background:rgba(246,196,83,.08);border:1px solid rgba(246,196,83,.18)}
#newList .item{background:rgba(255,255,255,.045)}
#scrollTopBtn{position:fixed;right:18px;bottom:18px;width:54px;height:54px;display:flex;align-items:center;justify-content:center;border:none;border-radius:50%;background:rgba(255,255,255,.08);backdrop-filter:blur(14px);color:white;font-size:24px;cursor:pointer;z-index:9999;box-shadow:0 4px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.15)}
.modal{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.86);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:18px}
.modal-box{width:100%;max-width:420px;background:#111114;border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:16px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-box img{width:100%;max-height:540px;object-fit:cover;border-radius:16px}
.modal-title{margin:14px 0 12px;font-size:22px;font-weight:900}
.modal-actions{display:flex;gap:10px;margin-top:10px}
.modal-actions a,.modal-actions button{flex:1;padding:12px;border-radius:14px;border:none;font-weight:900;text-decoration:none;cursor:pointer}
.kp-btn{background:var(--gold);color:#111}
.close-btn{background:rgba(255,255,255,.1);color:white}

.lock-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top,rgba(246,196,83,.16),transparent 32%),#050505;color:white;text-align:center}
.lock-card{width:100%;max-width:430px;background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.025));border:1px solid rgba(246,196,83,.18);border-radius:26px;padding:28px 20px;box-shadow:0 24px 70px rgba(0,0,0,.55)}
.lock-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.lock-logo-a{font-size:58px;font-weight:900;letter-spacing:-3px;line-height:1}
.lock-play{width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:20px solid var(--gold)}
.lock-title{font-size:24px;font-weight:900;margin:8px 0 10px}
.lock-text{color:#cfcfcf;font-size:15px;line-height:1.55;margin:0 auto 18px;max-width:340px}
.lock-btn{display:inline-block;background:var(--gold);color:#050505;padding:15px 22px;border-radius:16px;text-decoration:none;font-weight:900;box-shadow:0 10px 28px rgba(246,196,83,.22)}
.secondary-lock-btn{background:rgba(255,255,255,.1)!important;color:white!important;border:1px solid rgba(255,255,255,.16)!important;box-shadow:none!important}
.lock-note{margin-top:14px;color:var(--muted);font-size:12px;line-height:1.4}
#appContent{display:none}

</style>
</head>

<body>

<div id="startBotScreen" class="lock-screen" style="display:none;">
  <div class="lock-card">
    <div class="lock-logo">
      <div class="lock-logo-a">A</div>
      <div class="lock-play"></div>
    </div>
    <div class="lock-title">🔒 Запустите бота</div>
    <p class="lock-text">Чтобы открыть каталог сериалов, сначала запустите Art_aTV Bot.</p>
    <a class="lock-btn" href="https://t.me/Art_aTV_bot?start=from_miniapp" onclick="markBotOpenClicked()">Запустить бота</a>
    <button id="openCatalogBtn" class="lock-btn secondary-lock-btn" style="display:none;margin-top:12px;border:none;cursor:pointer;" onclick="confirmBotStarted()">Я запустил бота — открыть каталог</button>
    <div class="lock-note">После запуска бота вернитесь сюда и нажмите «Открыть каталог».</div>
  </div>
</div>

<div id="appContent">

<div class="support"><a href="https://t.me/Art_aTV_support_bot">⚙️ Поддержка</a></div>

<div class="header">
  <div class="brand">
    <div class="logo-row">
      <div class="logo-a">A</div>
      <div class="play"></div>
      <a href="https://t.me/Art_aTV">@Art_aTV</a>
    </div>
    <div class="subtitle">Каталог популярных сериалов</div>
  </div>
</div>

<div class="counter" id="counter">Загрузка...</div>
<input id="search" placeholder="Поиск сериалов...">

<div class="section" onclick="togglePopular()">
  <div><span>TOP 5</span> популярных</div>
  <div id="popularArrow">▾</div>
</div>
<div id="popularWrap" style="display:none;"><div class="list" id="popular"></div></div>

<div class="section" onclick="toggleNew()">
  <div><span>NEW</span> Новинки</div>
  <div id="newArrow">▾</div>
</div>
<div id="newWrap" style="display:none;"><div class="list" id="newList"></div></div>

<div class="section">🎬 Все сериалы</div>
<div class="list" id="list"></div>

<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

<div class="modal" id="posterModal">
  <div class="modal-box" id="modalBox">
    <img id="modalPoster" src="">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-actions">
      <a class="kp-btn" id="modalKp" target="_blank">Открыть на Кинопоиске</a>
      <button class="close-btn" onclick="closePoster()">Закрыть</button>
    </div>
  </div>
</div>

</div>

<script>
const firebaseConfig={apiKey:"AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",authDomain:"art-atv.firebaseapp.com",projectId:"art-atv",storageBucket:"art-atv.firebasestorage.app",messagingSenderId:"549965698241",appId:"1:549965698241:web:86cfa4dc6048d48d4ef040"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let tg=window.Telegram?.WebApp;
if(tg){tg.expand();}

function normalizeTitle(title){
  return String(title||"").toLowerCase().replace(/ё/g,"е").replace(/[^a-zа-я0-9]+/gi," ").replace(/\s+/g," ").trim();
}

function makeId(title){
  return "item-"+normalizeTitle(title).replace(/\s+/g,"-");
}

function safeUrl(url){
  url=String(url||"").trim();
  if(!url)return "https://www.kinopoisk.ru/";
  if(url.startsWith("http://")||url.startsWith("https://"))return url;
  return "https://" + url;
}

function getUser(){
  const u=tg?.initDataUnsafe?.user;
  if(u){
    return {id:String(u.id),username:u.username||"",first_name:u.first_name||"",last_name:u.last_name||"",source:"telegram"};
  }
  let guest=localStorage.getItem("art_atv_guest_id");
  if(!guest){
    guest="guest_"+Math.random().toString(36).slice(2)+Date.now();
    localStorage.setItem("art_atv_guest_id",guest);
  }
  return {id:guest,username:"",first_name:"Guest",last_name:"",source:"browser"};
}

const currentUser=getUser();
let appStarted=false;
let onlineInterval=null;
let sheetInterval=null;

function getBotStartedKey(){
  return "art_atv_bot_started_" + currentUser.id;
}

function checkBotStarted(){
  // Важно: без серверной связки с ботом Mini App не может на 100% проверить,
  // нажал ли пользователь Start в Telegram. Поэтому делаем мягкую проверку:
  // сначала просим открыть бота, а после возврата разрешаем открыть каталог,
  // чтобы приложение не блокировалось навсегда.
  if(localStorage.getItem(getBotStartedKey())==="yes"){
    startApp();
  }else{
    showStartBotScreen();
  }
}

function showStartBotScreen(){
  document.getElementById("appContent").style.display="none";
  document.getElementById("startBotScreen").style.display="flex";

  const clicked=localStorage.getItem(getBotStartedKey()+"_clicked")==="yes";
  const btn=document.getElementById("openCatalogBtn");
  if(btn)btn.style.display=clicked?"inline-block":"none";
}

function markBotOpenClicked(){
  localStorage.setItem(getBotStartedKey()+"_clicked","yes");
  saveEvent("bot_start_click","from_miniapp");

  setTimeout(()=>{
    const btn=document.getElementById("openCatalogBtn");
    if(btn)btn.style.display="inline-block";
  },800);
}

function confirmBotStarted(){
  localStorage.setItem(getBotStartedKey(),"yes");
  saveEvent("bot_start_confirm","from_miniapp");
  startApp();
}

function startApp(){
  if(appStarted)return;
  appStarted=true;

  document.getElementById("startBotScreen").style.display="none";
  document.getElementById("appContent").style.display="block";

  saveUserVisit();
  startOnlineHeartbeat();
  loadSheet();
  sheetInterval=setInterval(loadSheet,60000);
}

function saveUserVisit(){
  const now=Date.now();

  db.collection("users").doc(currentUser.id).set({
    id:currentUser.id,
    username:currentUser.username,
    first_name:currentUser.first_name,
    last_name:currentUser.last_name,
    source:currentUser.source,
    first_visit:firebase.firestore.FieldValue.serverTimestamp(),
    last_visit:now,
    opens:firebase.firestore.FieldValue.increment(1),
    user_agent:navigator.userAgent,
    language:navigator.language||"",
    platform:navigator.platform||""
  },{merge:true});

  db.collection("visits").add({
    user_id:currentUser.id,
    username:currentUser.username,
    source:currentUser.source,
    time:now,
    page:"catalog"
  });

  db.collection("online").doc(currentUser.id).set({
    user_id:currentUser.id,
    username:currentUser.username,
    source:currentUser.source,
    last_seen:now
  },{merge:true});
}

function startOnlineHeartbeat(){
  if(onlineInterval)return;

  onlineInterval=setInterval(()=>{
    db.collection("online").doc(currentUser.id).set({
      user_id:currentUser.id,
      username:currentUser.username,
      source:currentUser.source,
      last_seen:Date.now()
    },{merge:true});
  },30000);
}

function saveEvent(type,title=""){
  return db.collection("events").add({
    type,
    title,
    user_id:currentUser.id,
    username:currentUser.username,
    source:currentUser.source,
    time:Date.now()
  });
}

async function trackClick(title){
  const key=normalizeTitle(title);
  try{
    await db.collection("clicks").doc(key).set({
      title:title,
      count:firebase.firestore.FieldValue.increment(1),
      time:Date.now()
    },{merge:true});
    await saveEvent("access_click",title);
  }catch(err){
    console.error("Не удалось записать клик",err);
  }
}

function openAccessLink(url){
  url=safeUrl(url);
  if(tg?.openTelegramLink && url.includes("t.me/")){
    tg.openTelegramLink(url);
    return;
  }
  if(tg?.openLink){
    tg.openLink(url);
    return;
  }
  window.location.href=url;
}

function trackPoster(title){saveEvent("poster_open",title);}
function trackKP(title){saveEvent("kinopoisk_click",title);}

const SHEET="https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let allData=[];
let lastSheetText="";
let popularSubscribed=false;

function parseCSVRow(row){
  return row.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(v=>v.replace(/^"|"$/g,"").trim());
}

function loadSheet(){
  fetch(SHEET+"&cacheBust="+Date.now())
  .then(r=>r.text())
  .then(t=>{
    if(t===lastSheetText && allData.length)return;
    lastSheetText=t;

    const rows=t.trim().split("\n").slice(1);

    allData=rows.map(r=>{
      const c=parseCSVRow(r);
      return {
        title:(c[0]||"").trim(),
        link:safeUrl(c[1]||""),
        poster:safeUrl(c[2]||""),
        kp:safeUrl(c[3]||"")
      };
    }).filter(i=>i.title);

    document.getElementById("counter").innerText="🎬 Всего сериалов: "+allData.length+" · автообновление 60 сек";

    const q=normalizeTitle(document.getElementById("search").value);
    render(allData.filter(i=>normalizeTitle(i.title).includes(q)));
    renderNew(allData);
    loadPopular();
  })
  .catch(()=>{
    document.getElementById("counter").innerText="⚠️ Не удалось загрузить Google Sheets";
  });
}



function createItem(i){
  const item=document.createElement("div");
  item.className="item";
  item.id=makeId(i.title);
  item.dataset.title=normalizeTitle(i.title);

  const img=document.createElement("img");
  img.className="poster";
  img.src=i.poster;
  img.alt=i.title;
  img.addEventListener("click",()=>{
    openPoster(i);
  });

  const title=document.createElement("div");
  title.className="title";
  title.textContent=i.title;

  const btn=document.createElement("a");
  btn.className="btn";
  btn.href=i.link;
  btn.target="_blank";
  btn.textContent="Оформить доступ";
  btn.addEventListener("click",async (e)=>{
    e.preventDefault();
    await trackClick(i.title);
    openAccessLink(i.link);
  });

  item.appendChild(img);
  item.appendChild(title);
  item.appendChild(btn);

  return item;
}

function render(list){
  const box=document.getElementById("list");
  box.innerHTML="";
  list.forEach(i=>box.appendChild(createItem(i)));
}

function renderNew(list){
  const box=document.getElementById("newList");
  box.innerHTML="";
  list.slice(-5).reverse().forEach(i=>box.appendChild(createItem(i)));
}

function openPoster(i){
  trackPoster(i.title);

  document.getElementById("modalPoster").src=i.poster;
  document.getElementById("modalTitle").innerText=i.title;

  const kpBtn=document.getElementById("modalKp");
  kpBtn.href=i.kp;
  kpBtn.onclick=()=>trackKP(i.title);

  document.getElementById("posterModal").style.display="flex";
}

function closePoster(){
  document.getElementById("posterModal").style.display="none";
}

document.getElementById("posterModal").addEventListener("click",function(e){
  if(e.target.id==="posterModal")closePoster();
});

function loadPopular(){
  if(popularSubscribed)return;
  popularSubscribed=true;

  db.collection("clicks").onSnapshot(snap=>{
    let arr=[];
    snap.forEach(doc=>arr.push(doc.data()));
    arr.sort((a,b)=>(b.count||0)-(a.count||0));
    renderPopular(arr.slice(0,5));
  });
}

function renderPopular(list){
  const box=document.getElementById("popular");
  box.innerHTML="";

  list.forEach((i,index)=>{
    const div=document.createElement("div");
    div.className="item";
    div.style.cursor="pointer";

    const title=document.createElement("div");
    title.className="title";
    title.textContent=String(index+1).padStart(2,"0")+". "+i.title;

    const fire=document.createElement("div");
    fire.style.color="var(--gold)";
    fire.style.fontWeight="900";
    fire.textContent="🔥 "+(i.count||0);

    div.appendChild(title);
    div.appendChild(fire);

    div.addEventListener("click",()=>{
      scrollToTitle(i.title);
    });

    box.appendChild(div);
  });
}

function scrollToTitle(title){
  document.getElementById("search").value="";
  render(allData);

  setTimeout(()=>{
    const target=normalizeTitle(title);
    const items=document.querySelectorAll("#list .item");
    let found=null;

    items.forEach(el=>{
      if((el.dataset.title||"")===target)found=el;
    });

    if(!found){
      items.forEach(el=>{
        const t=el.dataset.title||"";
        if(t.includes(target)||target.includes(t))found=el;
      });
    }

    if(!found){
      alert("Сериал не найден в основном списке: "+title);
      return;
    }

    found.scrollIntoView({behavior:"smooth",block:"center"});
    found.classList.add("highlight");
    setTimeout(()=>found.classList.remove("highlight"),1800);
  },120);
}

let openPopular=false;
let openNew=false;

function togglePopular(){
  openPopular=!openPopular;
  document.getElementById("popularWrap").style.display=openPopular?"block":"none";
  document.getElementById("popularArrow").innerText=openPopular?"▴":"▾";
}

function toggleNew(){
  openNew=!openNew;
  document.getElementById("newWrap").style.display=openNew?"block":"none";
  document.getElementById("newArrow").innerText=openNew?"▴":"▾";
}

document.getElementById("search").addEventListener("input",e=>{
  const q=normalizeTitle(e.target.value);
  render(allData.filter(i=>normalizeTitle(i.title).includes(q)));
});

function scrollToTop(){
  window.scrollTo({top:0,behavior:"smooth"});
}

document.addEventListener("visibilitychange",()=>{
  if(!document.hidden && !appStarted){
    showStartBotScreen();
  }
});

checkBotStarted();
</script>

</body>
</html>
