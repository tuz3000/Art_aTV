<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог сериалов @Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
}

/* верхняя панель */
.header {
  padding:14px 16px;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

.brand {
  font-size:20px;
  font-weight:800;
}

.brand a {
  color:#3aa0ff;
  text-decoration:none;
}

/* поддержка */
.support {
  position:fixed;
  right:12px;
  top:12px;
  z-index:999;
}

.support a {
  display:block;
  background:#2b2b2b;
  color:#ddd;
  padding:8px 10px;
  border-radius:10px;
  text-decoration:none;
  font-size:12px;
  font-weight:600;
}

/* счётчик */
.counter {
  padding:10px 16px;
  font-size:14px;
  color:#aaa;
}

/* поиск */
input {
  width:92%;
  margin:10px 4%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1a1a1a;
  color:white;
  font-size:16px;
}

/* список */
.list {
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:10px;
}

/* карточка */
.item {
  display:flex;
  align-items:center;
  gap:14px;
  background:#15151c;
  padding:12px;
  border-radius:14px;
}

/* постер */
.poster {
  width:80px;
  height:120px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* название */
.title {
  flex:1;
  font-size:16px;
  font-weight:700;
}

/* кнопка */
.btn {
  background:#3aa0ff;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  text-decoration:none;
}

/* мобильная адаптация */
@media (max-width:500px){
  .poster {
    width:70px;
    height:105px;
  }
}
</style>
</head>

<body>

<!-- поддержка -->
<div class="support">
  <a href="https://t.me/Art_aTV_support_bot" target="_blank">⚙️ Support</a>
</div>

<!-- шапка -->
<div class="header">
  <div class="brand">
    Каталог сериалов <a href="https://t.me/Art_aTV">@Art_aTV</a>
  </div>
</div>

<div class="counter" id="counter">Загрузка...</div>

<input id="search" placeholder="Поиск сериалов...">

<div class="list" id="list"></div>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

console.log("🔥 Firebase loaded");

// КЛИКИ (С ЛОГАМИ)
function trackClick(title) {
  console.log("👉 CLICK:", title);

  db.collection("clicks").add({
    title: title,
    count: 1,
    time: Date.now()
  })
  .then(() => console.log("✅ SAVED"))
  .catch(err => console.log("❌ FIREBASE ERROR:", err));
}

// Google Sheets CSV
const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let allData = [];

fetch(SHEET)
.then(r => r.text())
.then(t => {

  const rows = t.trim().split("\n").slice(1);

  allData = rows.map(r => {
    const cols = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

    return {
      title: (cols[0] || "").trim(),
      link: (cols[1] || "").trim(),
      poster: (cols[2] || "").trim(),
      kp: (cols[3] || "").trim()
    };
  });

  document.getElementById("counter").innerText =
    "🎬 Всего сериалов: " + allData.length;

  render(allData);
});

function render(list){
  const box = document.getElementById("list");
  box.innerHTML = "";

  list.forEach(i => {

    box.innerHTML += `
    <div class="item">

      <img class="poster"
           src="${i.poster}"
           onclick="window.open('${i.kp}','_blank')">

      <div class="title">${i.title}</div>

      <a class="btn"
         href="${i.link}"
         target="_blank"
         onclick="trackClick('${i.title}')">
         Оформить доступ
      </a>

    </div>`;
  });
}

// поиск
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  render(allData.filter(i =>
    (i.title || "").toLowerCase().includes(q)
  ));
});

</script>

</body>
</html>
