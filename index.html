<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог @Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

/* HEADER */
.header{
  padding:16px;
  font-size:18px;
  font-weight:800;
  background:#111;
}

.header a{
  color:#3aa0ff;
  text-decoration:none;
}

/* SUPPORT BUTTON */
.support-btn{
  position:fixed;
  top:12px;
  right:12px;
  background:#2a2a2a;
  color:#ccc;
  padding:8px 12px;
  border-radius:10px;
  font-size:12px;
  cursor:pointer;
  z-index:999;
  transition:0.3s;
}

.support-btn:hover{
  background:#3a3a3a;
  color:white;
}

/* SECTION */
.section{
  padding:12px;
  color:#3aa0ff;
  font-weight:800;
}

/* CARD */
.card{
  display:flex;
  gap:12px;
  padding:12px;
  margin:10px 12px;
  background:#15151c;
  border-radius:12px;
}

.card img{
  width:70px;
  height:100px;
  object-fit:cover;
  border-radius:6px;
}

.title{
  font-weight:700;
}

.btn{
  margin-top:6px;
  display:inline-block;
  padding:6px 10px;
  background:#3aa0ff;
  color:white;
  border-radius:8px;
  font-size:12px;
  text-decoration:none;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  margin:6px 12px;
  padding:10px;
  background:#1a1a22;
  border-radius:10px;
  cursor:pointer;
}

/* HIGHLIGHT */
.highlight{
  border:2px solid #3aa0ff;
  box-shadow:0 0 20px rgba(58,160,255,0.6);
  transform:scale(1.02);
}

/* UP BUTTON (modern glass style) */
.up-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.15);
  color:white;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:999;
  transition:0.25s;
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.up-btn:hover{
  background:rgba(255,255,255,0.15);
  transform:scale(1.1);
}
</style>
</head>

<body>

<!-- SUPPORT -->
<div class="support-btn" onclick="window.open('https://t.me/Art_aTV','_blank')">
⚙️ Support
</div>

<!-- HEADER -->
<div class="header">
Каталог <a href="https://t.me/Art_aTV" target="_blank">@Art_aTV</a>
</div>

<div class="section">🔥 ТОП 5 популярных</div>
<div id="top"></div>

<div class="section">🎬 Все сериалы</div>
<div id="list"></div>

<!-- UP BUTTON -->
<div class="up-btn" onclick="scrollTopPage()">↑</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// ================= CLICK =================
function trackClick(title){
  const ref = db.collection("clicks").doc(title);

  ref.set({
    title:title,
    count:firebase.firestore.FieldValue.increment(1)
  },{merge:true});
}


// ================= LOAD =================
const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data=[];

fetch(SHEET).then(r=>r.text()).then(t=>{

  const rows=t.trim().split("\n").slice(1);

  data = rows.map(r=>{
    const c=r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

    return{
      title:c[0],
      link:c[1],
      poster:c[2],
      kp:c[3]
    };
  });

  render();
  loadTop();
});


// ================= RENDER =================
function render(){

  const box=document.getElementById("list");
  box.innerHTML="";

  data.forEach(i=>{

    const id="card-"+i.title.replaceAll(" ","_");

    box.innerHTML+=`
      <div class="card" id="${id}">

        <img src="${i.poster}">

        <div>
          <div class="title">${i.title}</div>

          <a class="btn"
            href="${i.link}"
            target="_blank"
            onclick="trackClick('${i.title}')">
            Смотреть
          </a>
        </div>

      </div>
    `;
  });
}


// ================= TOP =================
function loadTop(){

  db.collection("clicks").onSnapshot(snap=>{

    let arr=[];
    snap.forEach(d=>arr.push(d.data()));

    arr.sort((a,b)=>(b.count||0)-(a.count||0));

    arr = arr.slice(0,5);

    const box=document.getElementById("top");
    box.innerHTML="";

    arr.forEach((i,index)=>{

      box.innerHTML+=`
        <div class="top" onclick="goTo('${i.title}')">
          <div>${index+1}. ${i.title}</div>
          <div>🔥 ${i.count||0}</div>
        </div>
      `;
    });

  });
}


// ================= SCROLL + HIGHLIGHT =================
function goTo(title){

  const id="card-"+title.replaceAll(" ","_");
  const el=document.getElementById(id);

  if(!el) return;

  el.scrollIntoView({behavior:"smooth",block:"center"});

  el.classList.add("highlight");

  setTimeout(()=>{
    el.classList.remove("highlight");
  },2500);
}


// ================= TOP SCROLL =================
function scrollTopPage(){
  window.scrollTo({top:0,behavior:"smooth"});
}

</script>

</body>
</html>
