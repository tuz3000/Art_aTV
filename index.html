<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог сериалов @Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

.header{
  padding:14px;
  background:#111;
  font-size:18px;
  font-weight:800;
}

.counter{
  padding:10px 14px;
  color:#aaa;
}

input{
  width:92%;
  margin:10px 4%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.section{
  padding:14px;
  color:#3aa0ff;
  font-weight:700;
}

.list{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:12px;
}

.item{
  display:flex;
  gap:12px;
  align-items:center;
  background:#15151c;
  padding:12px;
  border-radius:12px;
}

.poster{
  width:70px;
  height:100px;
  object-fit:cover;
  border-radius:6px;
}

.title{
  flex:1;
  font-weight:700;
}

.btn{
  background:#3aa0ff;
  color:white;
  padding:8px 10px;
  border-radius:8px;
  font-size:12px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
Каталог сериалов @Art_aTV
</div>

<div class="counter" id="counter">Загрузка...</div>

<input id="search" placeholder="Поиск...">

<div class="section">🎬 Все сериалы</div>
<div class="list" id="list"></div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// ================= TELEGRAM =================
let tg = window.Telegram?.WebApp;
tg?.expand();

const user = {
  id: tg?.initDataUnsafe?.user?.id || "no_telegram",
  username: tg?.initDataUnsafe?.user?.username || "no_username"
};


// ================= ONLINE SYSTEM =================
const onlineRef = db.collection("online").doc(String(user.id));

function setOnline(){
  onlineRef.set({
    username:user.username,
    lastSeen:Date.now()
  },{merge:true});
}

setOnline();
setInterval(setOnline,30000);

window.addEventListener("beforeunload",()=>{
  onlineRef.delete();
});


// ================= ANALYTICS =================
function trackEvent(type,data=""){
  db.collection("analytics").add({
    user_id:user.id,
    username:user.username,
    type,
    data,
    time:Date.now()
  });
}


// ================= DATA (СЕРИАЛЫ) =================
const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let allData=[];

fetch(SHEET)
.then(r=>r.text())
.then(t=>{

  const rows=t.trim().split("\n").slice(1);

  allData=rows.map(r=>{
    const c=r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

    return{
      title:(c[0]||"").trim(),
      link:(c[1]||"").trim(),
      poster:(c[2]||"").trim(),
      kp:(c[3]||"").trim()
    };
  });

  document.getElementById("counter").innerText =
  "🎬 Всего сериалов: " + allData.length;

  render(allData);

  trackEvent("open_app");
});


// ================= RENDER =================
function render(list){
  const box=document.getElementById("list");
  box.innerHTML="";

  list.forEach(i=>{

    box.innerHTML+=`
    <div class="item">

      <img class="poster"
        src="${i.poster}"
        onclick="window.open('${i.kp}','_blank')">

      <div class="title">${i.title}</div>

      <a class="btn"
        href="${i.link}"
        target="_blank"
        onclick="trackEvent('click', '${i.title}')">
        Оформить доступ
      </a>

    </div>`;
  });
}


// ================= SEARCH =================
document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();

  render(allData.filter(i=>
    i.title.toLowerCase().includes(q)
  ));
});

</script>

</body>
</html>
