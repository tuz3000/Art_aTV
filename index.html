<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root{
  --bg:#050505;
  --card:#111114;
  --white:#ffffff;
  --muted:#9b9b9b;
  --gold:#f6c453;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 28%),
    #050505;
  color:white;
}

.header{
  position:sticky;
  top:0;
  z-index:20;
  padding:18px 16px 14px;
  background:rgba(5,5,5,0.9);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.brand{
  display:flex;
  flex-direction:column;
  line-height:1.1;
}

.logo-row{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-a{
  font-size:34px;
  font-weight:900;
  letter-spacing:-2px;
}

.play{
  width:0;
  height:0;
  border-top:8px solid transparent;
  border-bottom:8px solid transparent;
  border-left:13px solid var(--gold);
}

.brand a{
  color:white;
  text-decoration:none;
  font-size:24px;
  font-weight:900;
}

.subtitle{
  margin-top:4px;
  color:var(--muted);
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.support{
  position:fixed;
  right:12px;
  top:14px;
  z-index:999;
}

.support a{
  display:block;
  background:rgba(255,255,255,0.08);
  color:#ddd;
  padding:9px 12px;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;
  text-decoration:none;
  font-size:12px;
  font-weight:800;
  backdrop-filter:blur(12px);
}

.counter{
  padding:12px 16px 4px;
  color:var(--muted);
  font-size:13px;
}

input{
  width:92%;
  margin:10px 4%;
  padding:15px 16px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.06);
  color:white;
  font-size:16px;
  outline:none;
  backdrop-filter:blur(12px);
}

input::placeholder{
  color:#777;
}

.section{
  padding:18px 16px 10px;
  color:white;
  font-weight:900;
  letter-spacing:.4px;
  cursor:pointer;
}

.section span{
  color:var(--gold);
}

.list{
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:10px 12px;
}

.item{
  display:flex;
  align-items:center;
  gap:14px;
  background:linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025));
  border:1px solid rgba(255,255,255,0.07);
  padding:12px;
  border-radius:18px;
  scroll-margin-top:120px;
  transition:.25s ease;
  box-shadow:0 12px 30px rgba(0,0,0,0.28);
}

.item.highlight{
  outline:2px solid var(--gold);
  box-shadow:0 0 28px rgba(246,196,83,0.45);
  transform:scale(1.02);
}

.poster{
  width:86px;
  height:128px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,0.45);
}

.title{
  flex:1;
  font-size:18px;
  line-height:1.2;
  font-weight:900;
  color:white;
}

.btn{
  background:white;
  color:#050505;
  padding:10px 13px;
  border-radius:12px;
  font-size:13px;
  font-weight:900;
  text-decoration:none;
  white-space:nowrap;
}

#popular .item{
  background:rgba(246,196,83,0.08);
  border:1px solid rgba(246,196,83,0.18);
}

#scrollTopBtn{
  position:fixed;
  right:18px;
  bottom:18px;
  width:54px;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:
    0 4px 18px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.15);
  color:white;
  font-size:24px;
  cursor:pointer;
  z-index:9999;
  transition:.2s ease;
}

#scrollTopBtn:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,0.15);
}

@media(max-width:480px){
  .brand a{
    font-size:22px;
  }

  .title{
    font-size:17px;
  }

  .btn{
    font-size:12px;
    padding:9px 10px;
  }

  .poster{
    width:82px;
    height:122px;
  }
}
</style>
</head>

<body>

<div class="support">
  <a href="https://t.me/Art_aTV_support_bot">⚙️ Поддержка</a>
</div>

<div class="header">
  <div class="brand">
    <div class="logo-row">
      <div class="logo-a">A</div>
      <div class="play"></div>
      <a href="https://t.me/Art_aTV">@Art_aTV</a>
    </div>
    <div class="subtitle">Каталог сериалов</div>
  </div>
</div>

<div class="counter" id="counter">Загрузка...</div>

<input id="search" placeholder="Поиск сериалов...">

<div class="section" onclick="togglePopular()">
<span>TOP 5</span> популярных ▾
</div>

<div id="popularWrap" style="display:none;">
  <div class="list" id="popular"></div>
</div>

<div class="section">🎬 Все сериалы</div>
<div class="list" id="list"></div>

<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function makeId(title){
  return "item-" + title.trim().toLowerCase().replace(/\s+/g,"-");
}

function trackClick(title){
  const key = title.trim().toLowerCase();

  db.collection("clicks").doc(key).set({
    title: title,
    count: firebase.firestore.FieldValue.increment(1),
    time: Date.now()
  }, { merge:true });
}

const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let allData=[];

fetch(SHEET)
.then(r=>r.text())
.then(t=>{

  const rows=t.trim().split("\n").slice(1);

  allData=rows.map(r=>{
    const c=r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

    return{
      title:(c[0]||"").trim(),
      link:(c[1]||"").trim(),
      poster:(c[2]||"").trim(),
      kp:(c[3]||"").trim()
    };
  });

  document.getElementById("counter").innerText =
  "🎬 Всего сериалов: " + allData.length;

  render(allData);
  loadPopular();
});

function render(list){
  const box=document.getElementById("list");
  box.innerHTML="";

  list.forEach(i=>{

    const id = makeId(i.title);

    box.innerHTML+=`
    <div class="item" id="${id}">

      <img class="poster"
        src="${i.poster}"
        onclick="window.open('${i.kp}','_blank')">

      <div class="title">${i.title}</div>

      <a class="btn"
        href="${i.link}"
        target="_blank"
        onclick="trackClick('${i.title}')">
        Оформить доступ
      </a>

    </div>`;
  });
}

function loadPopular(){

  db.collection("clicks")
  .onSnapshot(snap=>{
    let arr=[];

    snap.forEach(doc=>{
      arr.push(doc.data());
    });

    arr.sort((a,b)=>(b.count||0)-(a.count||0));
    arr = arr.slice(0,5);

    renderPopular(arr);
  });
}

function renderPopular(list){
  const box=document.getElementById("popular");
  box.innerHTML="";

  list.forEach((i,index)=>{

    const id = makeId(i.title);
    const num = String(index + 1).padStart(2,"0");

    box.innerHTML+=`
    <div class="item"
      style="cursor:pointer"
      onclick="scrollToItem('${id}')">

      <div class="title">${num}. ${i.title}</div>

      <div style="color:var(--gold);font-weight:900">
        🔥 ${i.count||0}
      </div>

    </div>`;
  });
}

function scrollToItem(id){

  const el = document.getElementById(id);

  if(!el) return;

  el.scrollIntoView({
    behavior:"smooth",
    block:"center"
  });

  el.classList.add("highlight");

  setTimeout(()=>{
    el.classList.remove("highlight");
  },1800);
}

let openPopular=false;

function togglePopular(){
  openPopular=!openPopular;
  document.getElementById("popularWrap").style.display =
  openPopular ? "block" : "none";
}

document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();

  render(allData.filter(i=>
    i.title.toLowerCase().includes(q)
  ));
});

function scrollToTop(){
  window.scrollTo({top:0, behavior:"smooth"});
}

</script>

</body>
</html>
