<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог сериалов @Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
}

/* шапка */
.header {
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  font-weight:700;
}

/* бренд */
.brand {
  font-size:16px;
}

/* ссылка на канал */
.brand a {
  color:#3aa0ff;
  text-decoration:none;
}

/* техподдержка */
.support a {
  color:#3aa0ff;
  text-decoration:none;
  font-size:13px;
}

/* поиск */
input {
  width:92%;
  margin:14px 4%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:#1a1a1a;
  color:white;
  font-size:17px;
}

/* список */
.list {
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:12px;
}

/* карточка */
.item {
  display:flex;
  align-items:center;
  gap:16px;
  background:#15151c;
  padding:14px;
  border-radius:16px;
  min-height:130px;
}

/* постер */
.poster {
  width:95px;
  height:140px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  flex-shrink:0;
}

/* название */
.title {
  flex:1;
  font-size:18px;
  font-weight:700;
  line-height:1.2;
}

/* кнопка */
.btn {
  background:#3aa0ff;
  color:white;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  text-decoration:none;
  white-space:nowrap;
  flex-shrink:0;
  box-shadow:0 6px 14px rgba(58,160,255,0.35);
}

.btn:active {
  transform:scale(0.95);
}

/* адаптация */
@media (max-width: 500px) {

  .item {
    min-height:125px;
    padding:12px;
  }

  .poster {
    width:85px;
    height:125px;
  }

  .title {
    font-size:17px;
  }

  .btn {
    font-size:13px;
    padding:10px 12px;
  }
}
</style>
</head>

<body>

<!-- ШАПКА -->
<div class="header">

  <div class="brand">
    Каталог сериалов <a href="https://t.me/Art_aTV" target="_blank">@Art_aTV</a>
  </div>

  <div class="support">
    <a href="https://t.me/Art_aTV_support_bot" target="_blank">
      Техподдержка
    </a>
  </div>

</div>

<input id="search" placeholder="Поиск сериалов...">

<div class="list" id="list"></div>

<script>

const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];

fetch(SHEET)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    data = rows.map(r => {
        const cols = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

        return {
            title: (cols[0] || "").trim(),
            link: (cols[1] || "").trim(),
            poster: (cols[2] || "").trim(),
            kp: (cols[3] || "").trim()
        };
    });

    render(data);
});

function render(list){
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(i => {
        if(!i.title) return;

        box.innerHTML += `
        <div class="item">

            <img class="poster"
                 src="${i.poster}"
                 onclick="window.open('${i.kp}','_blank')">

            <div class="title">${i.title}</div>

            <a class="btn"
               href="${i.link}"
               target="_blank"
               rel="noopener noreferrer">
               Оформить доступ
            </a>

        </div>`;
    });
}

/* поиск */
document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(data.filter(i =>
        (i.title || "").toLowerCase().includes(q)
    ));
});

</script>

</body>
</html>
