<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Serials</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* верхняя панель */
.header {
  padding: 15px 20px;
  font-size: 20px;
  font-weight: bold;
  color: #e50914;
}

/* поиск */
input {
  width: 92%;
  margin: 10px 4%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  outline: none;
}

/* ряд как в Netflix */
.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 15px;
}

/* скрыть скролл */
.row::-webkit-scrollbar {
  display: none;
}

/* карточка */
.card {
  min-width: 140px;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.08);
}

.card img {
  width: 140px;
  height: 200px;
  object-fit: cover;
}

.title {
  font-size: 12px;
  padding: 6px;
  text-align: center;
}

/* кнопка */
.btn {
  display: block;
  text-align: center;
  background: #e50914;
  color: white;
  padding: 6px;
  font-size: 11px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="header">NETFLIX STYLE CATALOG</div>

<input id="search" placeholder="Поиск сериалов...">

<div class="row" id="list"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];

fetch(SHEET_URL)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    data = rows.map(r => {
        const cols = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

        return {
            poster: cols[0],
            title: cols[1],
            link: cols[2]
        };
    });

    render(data);
});

function render(list){
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(i => {
        if(!i.title) return;

        box.innerHTML += `
        <div class="card">
            <img src="${i.poster}">
            <div class="title">${i.title}</div>
            <a class="btn" href="${i.link}" target="_blank" rel="noopener noreferrer">
                СМОТРЕТЬ
            </a>
        </div>`;
    });
}

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(data.filter(i => (i.title || "").toLowerCase().includes(q)));
});

</script>

</body>
</html>
