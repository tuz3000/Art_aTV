<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог сериалов @Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
}

/* ШАПКА */
.header {
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  position:sticky;
  top:0;
  z-index:10;
}

.brand {
  font-size:15px;
  font-weight:700;
}

.brand a {
  color:#3aa0ff;
  text-decoration:none;
}

/* КНОПКА ПОДДЕРЖКИ (ЗАКРЕПЛЕНА) */
.support-fixed {
  position:sticky;
  top:48px;
  z-index:10;
  background:#0b0b0f;
  padding:10px 16px;
}

.support-fixed a {
  display:inline-block;
  background:#3aa0ff;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
}

/* СЧЁТЧИК */
.counter {
  padding:10px 16px;
  font-size:14px;
  color:#aaa;
}

/* БЫСТРЫЕ БУКВЫ */
.letters {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  padding:10px 16px;
}

.letters button {
  background:#1a1a1a;
  color:white;
  border:none;
  padding:6px 8px;
  border-radius:6px;
  font-size:12px;
}

/* ПОИСК */
input {
  width:92%;
  margin:10px 4%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1a1a1a;
  color:white;
  font-size:16px;
}

/* СПИСОК */
.list {
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:10px;
}

/* КАРТОЧКА */
.item {
  display:flex;
  align-items:center;
  gap:14px;
  background:#15151c;
  padding:12px;
  border-radius:14px;
  min-height:120px;
}

/* ПОСТЕР */
.poster {
  width:80px;
  height:120px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* НАЗВАНИЕ */
.title {
  flex:1;
  font-size:16px;
  font-weight:700;
}

/* КНОПКА */
.btn {
  background:#3aa0ff;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  text-decoration:none;
  white-space:nowrap;
}

.btn:active {
  transform:scale(0.95);
}

/* мобилка */
@media (max-width: 500px) {
  .poster {
    width:70px;
    height:105px;
  }

  .title {
    font-size:15px;
  }

  .btn {
    font-size:12px;
    padding:8px 10px;
  }
}
</style>
</head>

<body>

<!-- ШАПКА -->
<div class="header">
  <div class="brand">
    Каталог сериалов <a href="https://t.me/Art_aTV" target="_blank">@Art_aTV</a>
  </div>
</div>

<!-- ПОДДЕРЖКА (ЗАКРЕПЛЕНА) -->
<div class="support-fixed">
  <a href="https://t.me/Art_aTV_support_bot" target="_blank">⚙️ Техподдержка</a>
</div>

<!-- СЧЁТЧИК -->
<div class="counter" id="counter">Загрузка...</div>

<!-- БЫСТРЫЕ БУКВЫ -->
<div class="letters" id="letters"></div>

<!-- ПОИСК -->
<input id="search" placeholder="Поиск сериалов...">

<div class="list" id="list"></div>

<script>

const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];
let allData = [];

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZАБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЭЮЯ".split("");

// кнопки букв
const lettersBox = document.getElementById("letters");

letters.forEach(l => {
  const b = document.createElement("button");
  b.innerText = l;
  b.onclick = () => filterLetter(l);
  lettersBox.appendChild(b);
});

function filterLetter(letter){
  render(allData.filter(i => (i.title || "").toUpperCase().startsWith(letter)));
}

// загрузка данных
fetch(SHEET)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    allData = rows.map(r => {
        const cols = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

        return {
            title: (cols[0] || "").trim(),
            link: (cols[1] || "").trim(),
            poster: (cols[2] || "").trim(),
            kp: (cols[3] || "").trim()
        };
    });

    document.getElementById("counter").innerText =
      "🎬 Всего сериалов: " + allData.length;

    render(allData);
});

function render(list){
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(i => {
        if(!i.title) return;

        box.innerHTML += `
        <div class="item">

            <img class="poster"
                 src="${i.poster}"
                 onclick="window.open('${i.kp}','_blank')">

            <div class="title">${i.title}</div>

            <a class="btn"
               href="${i.link}"
               target="_blank"
               rel="noopener noreferrer">
               Оформить доступ
            </a>

        </div>`;
    });
}

/* поиск */
document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(allData.filter(i =>
        (i.title || "").toLowerCase().includes(q)
    ));
});

</script>

</body>
</html>
