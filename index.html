<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог @Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

.header{
  padding:14px 16px;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

.brand{
  font-size:20px;
  font-weight:800;
}

.brand a{
  color:#3aa0ff;
  text-decoration:none;
}

.support{
  position:fixed;
  right:12px;
  top:12px;
  z-index:999;
}

.support a{
  display:block;
  background:#2b2b2b;
  color:#ddd;
  padding:8px 10px;
  border-radius:10px;
  text-decoration:none;
  font-size:12px;
  font-weight:600;
}

.counter{
  padding:10px 16px;
  color:#aaa;
}

input{
  width:92%;
  margin:10px 4%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.section{
  padding:10px 12px;
  color:#3aa0ff;
  font-weight:700;
  cursor:pointer;
}

.list{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:10px;
}

.item{
  display:flex;
  align-items:center;
  gap:14px;
  background:#15151c;
  padding:12px;
  border-radius:14px;
  scroll-margin-top:100px;
  transition:0.3s;
}

.item.highlight{
  outline:2px solid #3aa0ff;
  transform:scale(1.02);
}

.poster{
  width:80px;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

.title{
  flex:1;
  font-size:16px;
  font-weight:700;
}

.btn{
  background:#3aa0ff;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="support">
  <a href="https://t.me/Art_aTV_support_bot">⚙️ Техподдержка</a>
</div>

<div class="header">
  <div class="brand">
    Каталог сериалов <a href="https://t.me/Art_aTV">@Art_aTV</a>
  </div>
</div>

<div class="counter" id="counter">Загрузка...</div>

<input id="search" placeholder="Поиск сериалов...">

<div class="section" onclick="togglePopular()">
🔥 Популярное ▾
</div>

<div id="popularWrap" style="display:none;">
  <div class="list" id="popular"></div>
</div>

<div class="section">🎬 Все сериалы</div>
<div class="list" id="list"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// нормализация ID
function makeId(title){
  return "item-" + title.trim().toLowerCase().replace(/\s+/g,"-");
}

// клики
function trackClick(title){
  const key = title.trim().toLowerCase();

  db.collection("clicks").doc(key).set({
    title: title,
    count: firebase.firestore.FieldValue.increment(1),
    time: Date.now()
  }, { merge:true });
}

// SHEET
const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let allData=[];

fetch(SHEET)
.then(r=>r.text())
.then(t=>{

  const rows=t.trim().split("\n").slice(1);

  allData=rows.map(r=>{
    const c=r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

    return{
      title:(c[0]||"").trim(),
      link:(c[1]||"").trim(),
      poster:(c[2]||"").trim(),
      kp:(c[3]||"").trim()
    };
  });

  document.getElementById("counter").innerText =
  "🎬 Всего сериалов: " + allData.length;

  render(allData);
  loadPopular();
});

// ВСЕ СЕРИАЛЫ
function render(list){
  const box=document.getElementById("list");
  box.innerHTML="";

  list.forEach(i=>{

    const id = makeId(i.title);

    box.innerHTML+=`
    <div class="item" id="${id}">

      <img class="poster"
        src="${i.poster}"
        onclick="window.open('${i.kp}','_blank')">

      <div class="title">${i.title}</div>

      <a class="btn"
        href="${i.link}"
        target="_blank"
        onclick="trackClick('${i.title}')">
        Оформить доступ
      </a>

    </div>`;
  });
}

// ПОПУЛЯРНОЕ
function loadPopular(){

  db.collection("clicks")
  .get()
  .then(snap=>{

    let arr=[];

    snap.forEach(doc=>{
      arr.push(doc.data());
    });

    arr.sort((a,b)=>(b.count||0)-(a.count||0));
    arr = arr.slice(0,5);

    renderPopular(arr);
  });
}

// ПОПУЛЯРНОЕ (КЛИКАБЕЛЬНОЕ)
function renderPopular(list){
  const box=document.getElementById("popular");
  box.innerHTML="";

  list.forEach(i=>{

    const id = makeId(i.title);

    box.innerHTML+=`
    <div class="item"
      style="cursor:pointer"
      onclick="scrollToItem('${id}')">

      <div class="title">${i.title}</div>

      <div style="color:#3aa0ff;font-weight:700">
        🔥 ${i.count||0}
      </div>

    </div>`;
  });
}

// СКРОЛЛ + ПОДСВЕТКА
function scrollToItem(id){

  const el = document.getElementById(id);

  if(!el) return;

  el.scrollIntoView({
    behavior:"smooth",
    block:"center"
  });

  el.classList.add("highlight");

  setTimeout(()=>{
    el.classList.remove("highlight");
  },1500);
}

// раскрытие
let openPopular=false;

function togglePopular(){
  openPopular=!openPopular;
  document.getElementById("popularWrap").style.display =
  openPopular ? "block" : "none";
}

// поиск
document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();

  render(allData.filter(i=>
    i.title.toLowerCase().includes(q)
  ));
});

</script>

</body>
</html>
