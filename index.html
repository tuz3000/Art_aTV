<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Catalog</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
}

/* поиск */
input {
  width:92%;
  margin:10px 4%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
  font-size:14px;
}

/* список */
.list {
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:8px;
}

/* карточка */
.item {
  display:flex;
  align-items:center;
  gap:10px;
  background:#15151c;
  padding:8px;
  border-radius:12px;
  height:92px;
}

/* постер */
.poster {
  width:50px;
  height:75px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
  flex-shrink:0;
}

/* название */
.title {
  flex:1;
  font-size:13px;
  line-height:1.2;
  overflow:hidden;
}

/* кнопка */
.btn {
  background:#e50914;
  color:white;
  padding:8px 10px;
  border-radius:8px;
  font-size:11px;
  text-decoration:none;
  white-space:nowrap;
  flex-shrink:0;
}

/* адаптация под телефон */
@media (max-width: 500px) {
  .item {
    height:88px;
  }

  .title {
    font-size:12px;
  }

  .btn {
    padding:7px 8px;
    font-size:10px;
  }
}
</style>
</head>

<body>

<input id="search" placeholder="Поиск...">

<div class="list" id="list"></div>

<script>

const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];

fetch(SHEET)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    data = rows.map(r => {
        const cols = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

        return {
            title: (cols[0] || "").trim(),
            link: (cols[1] || "").trim(),
            poster: (cols[2] || "").trim(),
            kp: (cols[3] || "").trim()
        };
    });

    render(data);
});

function render(list){
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(i => {
        if(!i.title) return;

        box.innerHTML += `
        <div class="item">

            <img class="poster"
                 src="${i.poster}"
                 onclick="window.open('${i.kp}','_blank')">

            <div class="title">${i.title}</div>

            <a class="btn"
               href="${i.link}"
               target="_blank"
               rel="noopener noreferrer">
               Оформить доступ
            </a>

        </div>`;
    });
}

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(data.filter(i =>
        (i.title || "").toLowerCase().includes(q)
    ));
});

</script>

</body>
</html>
