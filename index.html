<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>@Art_aTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

/* FIXED HEADER */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#111;
  padding:12px 14px;
  font-weight:900;
  z-index:999;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header a{
  color:#3aa0ff;
  text-decoration:none;
  font-weight:900;
}

/* SEARCH */
.search{
  margin-top:60px;
  padding:10px 12px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

/* SUPPORT FIXED */
.support-btn{
  position:fixed;
  top:10px;
  right:10px;
  background:#2a2a2a;
  color:white;
  padding:9px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:900;
  z-index:1000;
  cursor:pointer;
}

/* SECTION */
.section{
  padding:12px;
  font-weight:900;
  color:#3aa0ff;
  margin-top:10px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  margin:6px 12px;
  padding:10px;
  background:#1a1a22;
  border-radius:10px;
  cursor:pointer;
}

/* SPACE BETWEEN TOP & LIST */
.spacer{
  height:18px;
}

/* CARD */
.card{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px;
  margin:10px 12px;
  background:#15151c;
  border-radius:12px;
}

/* POSTER */
.card img{
  width:80px;
  height:115px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* TITLE */
.title{
  flex:1;
  font-weight:900;
  font-size:18px;
}

/* BUTTON */
.btn{
  background:#3aa0ff;
  padding:9px 12px;
  border-radius:8px;
  font-size:13px;
  color:white;
  text-decoration:none;
  white-space:nowrap;
}

/* HIGHLIGHT */
.highlight{
  border:2px solid #3aa0ff;
  box-shadow:0 0 20px rgba(58,160,255,0.6);
  transform:scale(1.02);
}

/* UP BUTTON */
.up-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- FIXED HEADER -->
<div class="header">
  <div>@Art_aTV</div>
  <div class="support-btn" onclick="window.open('https://t.me/Art_aTV_support_bot','_blank')">
    ⚙️ Поддержка
  </div>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Поиск сериалов..." oninput="render()">
</div>

<!-- TOP -->
<div class="section">🔥 ТОП 5 популярных</div>
<div id="top"></div>

<div class="spacer"></div>

<!-- LIST -->
<div class="section">🎬 Все сериалы</div>
<div id="list"></div>

<div class="up-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>

const SHEET =
"https://docs.google.com/spreadsheets/d/1-mtEef4gMgTEL0HfgWGGTQON8jkXSrFXgEGmqt-0ta4/export?format=csv";

let data = [];

// CLICK STORAGE
let clicks = JSON.parse(localStorage.getItem("clicks") || "{}");

function saveClicks(){
  localStorage.setItem("clicks", JSON.stringify(clicks));
}


// ================= LOAD SHEET =================
fetch(SHEET)
.then(r=>r.text())
.then(t=>{

  const rows = t.trim().split("\n").slice(1);

  data = rows.map(r=>{
    const c = r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

    return {
      title: (c[0] || "").trim(),
      link: (c[1] || "").trim(),
      poster: (c[2] || "").trim(),
      kpLink: (c[3] || "").trim()
    };
  });

  render();
  updateTop();
});


// ================= SEARCH + RENDER =================
function render(){

  const q = document.getElementById("search").value?.toLowerCase() || "";

  const box = document.getElementById("list");
  box.innerHTML = "";

  data
  .filter(i=>i.title.toLowerCase().includes(q))
  .forEach(i=>{

    box.innerHTML += `
      <div class="card">

        <img src="${i.poster}"
          onclick="openKP('${i.kpLink}')">

        <div class="title">${i.title}</div>

        <a class="btn"
           href="${i.link}"
           onclick="addClick('${i.title}')"
           target="_blank">
           Оформить доступ
        </a>

      </div>
    `;
  });
}


// ================= TOP 5 BY CLICKS =================
function updateTop(){

  const box = document.getElementById("top");
  box.innerHTML = "";

  const sorted = Object.entries(clicks)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  sorted.forEach(([title,count],i)=>{

    box.innerHTML += `
      <div class="top" onclick="goTo('${title}')">
        <div>${i+1}. ${title}</div>
        <div>🔥 ${count}</div>
      </div>
    `;
  });
}


// ================= CLICK SYSTEM =================
function addClick(title){

  clicks[title] = (clicks[title] || 0) + 1;
  saveClicks();
  updateTop();
}


// ================= GO TO =================
function goTo(title){

  document.querySelectorAll(".card").forEach(c=>{
    if(c.innerText.includes(title)){
      c.scrollIntoView({behavior:"smooth",block:"center"});
      c.classList.add("highlight");

      setTimeout(()=>c.classList.remove("highlight"),2000);
    }
  });
}


// ================= OPEN KP =================
function openKP(link){

  if(!link) link="https://www.kinopoisk.ru/";
  window.open(link,"_blank");
}

</script>

</body>
</html>
