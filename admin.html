<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Art_aTV Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

.card{
  margin:12px;
  padding:14px;
  background:#15151c;
  border-radius:12px;
}

.big{
  font-size:22px;
  font-weight:800;
  color:#3aa0ff;
}

.top{
  margin:6px 0;
}
</style>
</head>

<body>

<div class="card">
  <div class="big" id="clicks">0</div>
  🔥 Total clicks
</div>

<div class="card">
  <div class="big">TOP 5</div>
  <div id="top"></div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("clicks").onSnapshot(snap=>{

  let total=0;
  let arr=[];

  snap.forEach(d=>{
    total+=d.data().count||0;
    arr.push(d.data());
  });

  document.getElementById("clicks").innerText=total;

  arr.sort((a,b)=>(b.count||0)-(a.count||0));

  document.getElementById("top").innerHTML =
    arr.slice(0,5).map((i,index)=>
      `${index+1}. ${i.title} (${i.count})`
    ).join("<br>");

});

</script>

</body>
</html>
