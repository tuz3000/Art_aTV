<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Analytics PRO 2.0 - Art_aTV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

.header{
  padding:14px;
  background:#111;
  font-size:18px;
  font-weight:800;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background:#15151c;
  border-radius:14px;
  padding:14px;
}

.big{
  font-size:26px;
  font-weight:900;
  color:#3aa0ff;
}

.small{
  color:#aaa;
  font-size:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td,th{
  padding:8px;
  border-bottom:1px solid #222;
  font-size:13px;
}

input{
  width:95%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:10px;
  background:#3aa0ff;
  color:white;
  font-weight:700;
  cursor:pointer;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.badge{
  background:#222;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="header">📊 Analytics PRO 2.0 — Art_aTV (YouTube Studio Mode)</div>

<div class="grid">

  <div class="card">
    <div class="big" id="totalClicks">0</div>
    <div class="small">🔥 Total clicks</div>
  </div>

  <div class="card">
    <div class="big" id="uniqueSeries">0</div>
    <div class="small">🎬 Unique series</div>
  </div>

  <div class="card">
    <div class="big" id="todayClicks">0</div>
    <div class="small">📅 Today clicks</div>
  </div>

  <div class="card">
    <div class="big" id="topName">-</div>
    <div class="small">🏆 Top series</div>
  </div>

</div>

<div class="grid">

  <div class="card">
    <h3>📈 Clicks Chart (Realtime)</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>🧠 AI Insights</h3>
    <div id="insights" class="small"></div>
  </div>

</div>

<div class="card" style="margin:12px">
  <h3>🔥 All Series Analytics</h3>

  <input id="search" placeholder="Search series...">

  <button onclick="exportCSV()">📥 Export CSV</button>

  <table>
    <thead>
      <tr>
        <th>Series</th>
        <th>Clicks</th>
        <th>Trend</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= DATA =================
let allClicks = [];
let chart;

// ================= LIVE =================
db.collection("clicks").onSnapshot(snap => {

  allClicks = [];
  let total = 0;
  let map = {};

  snap.forEach(d => {
    const data = d.data();
    const count = data.count || 0;

    total += count;
    map[data.title] = count;

    allClicks.push({
      title: data.title,
      count: count,
      time: data.time || 0
    });
  });

  updateUI(total, map);
  renderTable(map);
  renderChart(map);
  analyze(map);
});

// ================= UI =================
function updateUI(total, map){

  document.getElementById("totalClicks").innerText = total;

  const entries = Object.entries(map);
  document.getElementById("uniqueSeries").innerText = entries.length;

  const top = entries.sort((a,b)=>b[1]-a[1])[0];
  document.getElementById("topName").innerText = top ? top[0] : "-";

  // today clicks
  const today = Date.now() - 86400000;
  let todayCount = allClicks.filter(i => i.time > today).length;
  document.getElementById("todayClicks").innerText = todayCount;
}

// ================= TABLE =================
function renderTable(map){

  let rows = Object.entries(map)
    .sort((a,b)=>b[1]-a[1]);

  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  rows.forEach(([title,count]) => {

    let trend = count > 50 ? "🔥 hot" :
                count > 10 ? "📈 growing" : "⚪ low";

    tbody.innerHTML += `
      <tr>
        <td>${title}</td>
        <td>${count}</td>
        <td>${trend}</td>
      </tr>
    `;
  });
}

// ================= CHART =================
function renderChart(map){

  const labels = Object.keys(map);
  const data = Object.values(map);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"bar",
    data:{
      labels,
      datasets:[{
        label:"Clicks",
        data,
        backgroundColor:"#3aa0ff"
      }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{display:false} }
    }
  });
}

// ================= AI INSIGHTS =================
function analyze(map){

  let entries = Object.entries(map);
  entries.sort((a,b)=>b[1]-a[1]);

  let top = entries[0];
  let avg = (entries.reduce((a,b)=>a+b[1],0) / entries.length).toFixed(1);

  document.getElementById("insights").innerHTML = `
    🧠 Most popular: <b>${top ? top[0] : "-"}</b><br><br>
    📊 Average clicks per series: <b>${avg}</b><br><br>
    ⚡ Total series: <b>${entries.length}</b><br><br>
    📈 Recommendation: promote top 3 series for max conversion
  `;
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", e => {

  let q = e.target.value.toLowerCase();

  let filtered = allClicks.filter(i =>
    i.title.toLowerCase().includes(q)
  );

  let map = {};
  filtered.forEach(i => map[i.title] = i.count);

  renderTable(map);
  renderChart(map);
});

// ================= EXPORT =================
function exportCSV(){

  let csv = "title,clicks\n";

  allClicks.forEach(i=>{
    csv += `${i.title},${i.count}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "analytics.csv";
  a.click();
}

</script>

</body>
</html>
