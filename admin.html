<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>YouTube Studio PRO Analytics</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

.header{
  padding:16px;
  font-size:20px;
  font-weight:800;
  background:#111;
  position:sticky;
  top:0;
  z-index:10;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#15151c;
  border-radius:12px;
  padding:14px;
}

.big{
  font-size:26px;
  font-weight:800;
  color:#3aa0ff;
}

.search{
  width:calc(100% - 20px);
  margin:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #222;
}

.rank{
  color:#3aa0ff;
  font-weight:700;
}

.green{color:#4ade80;}
.yellow{color:#facc15;}
.red{color:#f87171;}

canvas{
  margin:10px;
  max-height:420px;
}
</style>
</head>

<body>

<div class="header">
📊 YouTube Studio Style Analytics (Art_aTV)
</div>

<div class="grid">
  <div class="card">
    <div class="big" id="total">0</div>
    🔥 клики
  </div>

  <div class="card">
    <div class="big" id="series">0</div>
    🎬 сериалов
  </div>

  <div class="card">
    <div class="big" id="avg">0</div>
    📈 среднее
  </div>

  <div class="card">
    <div class="big" id="top">—</div>
    🏆 лидер
  </div>
</div>

<input class="search" id="search" placeholder="Поиск сериала...">

<canvas id="bar"></canvas>
<canvas id="pie"></canvas>

<table>
<thead>
<tr>
<th>#</th>
<th>Сериал</th>
<th>Клики</th>
<th>%</th>
<th>Активность</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];
let bar, pie;

function status(t){
  const d = Date.now() - (t||0);
  if(d < 86400000) return "🟢";
  if(d < 604800000) return "🟡";
  return "🔴";
}

function render(){

  let total = data.reduce((a,b)=>a+(b.count||0),0);

  document.getElementById("total").innerText = total;
  document.getElementById("series").innerText = data.length;
  document.getElementById("avg").innerText = data.length ? (total/data.length).toFixed(1) : 0;
  document.getElementById("top").innerText = data[0]?.title || "—";

  let q = document.getElementById("search").value.toLowerCase();

  let filtered = data.filter(i=>i.title.toLowerCase().includes(q));

  let tbody = "";

  filtered.forEach((i,idx)=>{

    let percent = total ? ((i.count/total)*100).toFixed(1) : 0;

    tbody += `
      <tr>
        <td class="rank">${idx+1}</td>
        <td>${i.title}</td>
        <td>${i.count}</td>
        <td>${percent}%</td>
        <td>${status(i.time)}</td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = tbody;

  draw(filtered.slice(0,20));
}

function draw(v){

  if(bar) bar.destroy();
  if(pie) pie.destroy();

  bar = new Chart(document.getElementById("bar"),{
    type:"bar",
    data:{
      labels:v.map(i=>i.title),
      datasets:[{
        label:"Клики",
        data:v.map(i=>i.count)
      }]
    }
  });

  pie = new Chart(document.getElementById("pie"),{
    type:"pie",
    data:{
      labels:v.slice(0,10).map(i=>i.title),
      datasets:[{
        data:v.slice(0,10).map(i=>i.count)
      }]
    }
  });
}

db.collection("clicks").onSnapshot(snap=>{

  let arr = [];

  snap.forEach(d=>{
    arr.push(d.data());
  });

  arr.sort((a,b)=>(b.count||0)-(a.count||0));

  data = arr;

  render();

});

document.getElementById("search").addEventListener("input",render);

</script>

</body>
</html>
