<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Analytics PRO 2.0 MAX</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0b0b0f;
  color:white;
  font-family:Arial;
}

.header{
  padding:16px;
  font-size:20px;
  font-weight:800;
  background:#111;
  position:sticky;
  top:0;
  z-index:10;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#15151c;
  border-radius:12px;
  padding:14px;
}

.big{
  font-size:26px;
  font-weight:800;
  color:#3aa0ff;
}

.search{
  width:calc(100% - 20px);
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  padding:10px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#3aa0ff;
}

.section{
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #222;
  text-align:left;
}

.rank{
  color:#3aa0ff;
  font-weight:700;
}

.badge{
  font-size:12px;
}

.green{color:#4ade80;}
.yellow{color:#facc15;}
.red{color:#f87171;}

canvas{
  margin:10px;
  max-height:420px;
}
</style>

</head>

<body>

<div class="header">📊 Analytics PRO 2.0 MAX</div>

<div class="grid">
  <div class="card"><div class="big" id="total">0</div>🔥 клики</div>
  <div class="card"><div class="big" id="shows">0</div>🎬 сериалов</div>
  <div class="card"><div class="big" id="avg">0</div>📈 среднее</div>
  <div class="card"><div class="big" id="top">—</div>🏆 лидер</div>
</div>

<div class="controls">
  <button onclick="setFilter(10)">TOP 10</button>
  <button onclick="setFilter(20)">TOP 20</button>
  <button onclick="setFilter(50)">TOP 50</button>
  <button onclick="setFilter(9999)">ALL</button>
  <button onclick="exportCSV()">EXPORT CSV</button>
</div>

<input class="search" id="search" placeholder="Поиск сериала...">

<canvas id="barChart"></canvas> <canvas id="pieChart"></canvas>

<div class="section">
<table>
<thead>
<tr>
<th>#</th>
<th>Сериал</th>
<th>Клики</th>
<th>%</th>
<th>Активность</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];
let limit = 20;
let barChart, pieChart;

function status(time){
  const diff = Date.now() - (time || 0);

  if(diff < 86400000) return "🟢";
  if(diff < 604800000) return "🟡";
  return "🔴";
}

function render(){

  let total = data.reduce((a,b)=>a + (b.count||0),0);

  document.getElementById("total").innerText = total;
  document.getElementById("shows").innerText = data.length;
  document.getElementById("avg").innerText = data.length ? (total/data.length).toFixed(1) : 0;
  document.getElementById("top").innerText = data[0]?.title || "—";

  let q = document.getElementById("search").value.toLowerCase();

  let filtered = data.filter(i => i.title.toLowerCase().includes(q));

  let view = filtered.slice(0, limit);

  let tbody = "";

  view.forEach((i,idx)=>{

    let percent = total ? ((i.count/total)*100).toFixed(1) : 0;

    tbody += `
      <tr>
        <td class="rank">${idx+1}</td>
        <td>${i.title}</td>
        <td>${i.count}</td>
        <td>${percent}%</td>
        <td class="badge ${status(i.time)}">${status(i.time)}</td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = tbody;

  drawCharts(view);
}

function drawCharts(view){

  let top20 = data.slice(0,20);

  if(barChart) barChart.destroy();

  barChart = new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
      labels:top20.map(i=>i.title),
      datasets:[{
        label:"Клики",
        data:top20.map(i=>i.count)
      }]
    }
  });

  let top10 = data.slice(0,10);

  if(pieChart) pieChart.destroy();

  pieChart = new Chart(document.getElementById("pieChart"),{
    type:"pie",
    data:{
      labels:top10.map(i=>i.title),
      datasets:[{
        data:top10.map(i=>i.count)
      }]
    }
  });
}

function setFilter(v){
  limit = v;
  render();
}

function exportCSV(){

  let csv = "title,count,time\n" +
    data.map(i =>
      `${i.title},${i.count},${i.time}`
    ).join("\n");

  let blob = new Blob([csv], {type:"text/csv"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "analytics.csv";
  a.click();
}

document.getElementById("search").addEventListener("input",render);

db.collection("clicks").onSnapshot(snap=>{

  let arr = [];

  snap.forEach(d=>{
    arr.push(d.data());
  });

  arr.sort((a,b)=>(b.count||0)-(a.count||0));

  data = arr;

  render();

});

</script>

</body>
</html>
