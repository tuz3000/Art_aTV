<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Analytics PRO MAX — Art_aTV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

.header{
  padding:16px;
  font-size:18px;
  font-weight:900;
  background:#111;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background:#15151c;
  border-radius:14px;
  padding:14px;
}

.big{
  font-size:28px;
  font-weight:900;
  color:#3aa0ff;
}

.small{
  font-size:12px;
  color:#aaa;
}

input,select{
  width:95%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:10px;
  background:#3aa0ff;
  color:white;
  font-weight:700;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td,th{
  padding:8px;
  border-bottom:1px solid #222;
  font-size:13px;
}

.badge{
  padding:3px 8px;
  border-radius:8px;
  background:#222;
  font-size:11px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="header">🚀 Analytics PRO MAX — YouTube Studio + Netflix AI</div>

<div class="grid">

  <div class="card">
    <div class="big" id="totalClicks">0</div>
    <div class="small">🔥 Total clicks</div>
  </div>

  <div class="card">
    <div class="big" id="totalSeries">0</div>
    <div class="small">🎬 Total series</div>
  </div>

  <div class="card">
    <div class="big" id="topSeries">-</div>
    <div class="small">🏆 Top series</div>
  </div>

  <div class="card">
    <div class="big" id="avgClicks">0</div>
    <div class="small">📊 Avg per series</div>
  </div>

</div>

<div class="grid">

  <div class="card">
    <h3>📈 Realtime chart</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>🧠 AI Insights</h3>
    <div id="ai"></div>
  </div>

</div>

<div class="card" style="margin:12px">

  <h3>🔎 Filters</h3>

  <input id="search" placeholder="Search series...">

  <select id="sort">
    <option value="desc">Most popular</option>
    <option value="asc">Least popular</option>
    <option value="alpha">Alphabet</option>
  </select>

  <button onclick="exportCSV()">📥 Export CSV</button>

  <table>
    <thead>
      <tr>
        <th>Series</th>
        <th>Clicks</th>
        <th>Trend</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDAfq6Tiqr_l9A6LxKtrx-9_AtoWqyzUzo",
  authDomain: "art-atv.firebaseapp.com",
  projectId: "art-atv",
  storageBucket: "art-atv.firebasestorage.app",
  messagingSenderId: "549965698241",
  appId: "1:549965698241:web:86cfa4dc6048d48d4ef040"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let chart;
let dataMap = {};
let raw = [];

// ================= LIVE =================
db.collection("clicks").onSnapshot(snap => {

  dataMap = {};
  raw = [];

  let total = 0;

  snap.forEach(d => {
    let v = d.data();
    let c = v.count || 0;

    dataMap[v.title] = c;
    total += c;

    raw.push({
      title:v.title,
      count:c,
      time:v.time || 0
    });
  });

  render(total);
});

// ================= MAIN =================
function render(total){

  let entries = Object.entries(dataMap);

  // top
  entries.sort((a,b)=>b[1]-a[1]);
  let top = entries[0];

  document.getElementById("totalClicks").innerText = total;
  document.getElementById("totalSeries").innerText = entries.length;
  document.getElementById("topSeries").innerText = top ? top[0] : "-";

  let avg = (total / (entries.length || 1)).toFixed(1);
  document.getElementById("avgClicks").innerText = avg;

  renderTable(entries);
  renderChart(entries);
  renderAI(entries);
}

// ================= TABLE =================
function renderTable(entries){

  let sort = document.getElementById("sort").value;

  if(sort === "desc") entries.sort((a,b)=>b[1]-a[1]);
  if(sort === "asc") entries.sort((a,b)=>a[1]-b[1]);
  if(sort === "alpha") entries.sort((a,b)=>a[0].localeCompare(b[0]));

  const q = document.getElementById("search").value.toLowerCase();

  let filtered = entries.filter(e =>
    e[0].toLowerCase().includes(q)
  );

  let tbody = document.getElementById("table");
  tbody.innerHTML = "";

  filtered.forEach(([title,count]) => {

    let trend =
      count > 50 ? "🔥 hot" :
      count > 10 ? "📈 mid" :
      "⚪ low";

    tbody.innerHTML += `
      <tr>
        <td>${title}</td>
        <td>${count}</td>
        <td>${trend}</td>
      </tr>
    `;
  });
}

// ================= CHART =================
function renderChart(entries){

  let labels = entries.map(e=>e[0]);
  let data = entries.map(e=>e[1]);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"bar",
    data:{
      labels,
      datasets:[{
        data,
        backgroundColor:"#3aa0ff"
      }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{display:false} }
    }
  });
}

// ================= AI =================
function renderAI(entries){

  if(entries.length === 0) return;

  let sorted = [...entries].sort((a,b)=>b[1]-a[1]);

  let top = sorted[0];
  let worst = sorted[sorted.length-1];

  let avg = (sorted.reduce((a,b)=>a+b[1],0)/sorted.length).toFixed(1);

  document.getElementById("ai").innerHTML = `
    🧠 Top performer: <b>${top[0]}</b><br><br>
    📉 Weak content: <b>${worst[0]}</b><br><br>
    📊 Average engagement: <b>${avg}</b><br><br>
    ⚡ Recommendation:<br>
    Promote top 3 series + improve thumbnails for low ones
  `;
}

// ================= EXPORT =================
function exportCSV(){

  let csv = "title,clicks\n";

  Object.entries(dataMap).forEach(([t,c])=>{
    csv += `${t},${c}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "PRO_MAX_analytics.csv";
  a.click();
}

// ================= EVENTS =================
document.getElementById("search").addEventListener("input",()=>render(0));
document.getElementById("sort").addEventListener("change",()=>render(0));

</script>

</body>
</html>
